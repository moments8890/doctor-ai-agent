<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Tree — Doctor AI Agent</title>
<style>
:root {
  --bg: #ffffff;
  --surface: #f6f8fa;
  --border: #d0d7de;
  --text: #1f2328;
  --muted: #656d76;
  --accent: #0969da;
  --green: #1a7f37;
  --tree-line: #c9d1d9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--surface);
  color: var(--text);
  line-height: 1.5;
  overflow-x: auto;
}

.container {
  padding: 24px;
  min-width: max-content;
}

h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

/* Stats bar */
.stats-bar { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.stat {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 20px;
  display: flex; flex-direction: column; min-width: 120px;
}
.stat-value { font-size: 28px; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value.doctor { color: var(--green); }
.stat-value.patient { color: var(--accent); }

/* ── Horizontal tree ── */
.htree {
  display: flex;
  align-items: flex-start;
}

/* A node = card + (optional) children column */
.hnode {
  display: flex;
  align-items: flex-start;
  position: relative;
}

/* Children container: vertical stack to the right of a connector line */
.hchildren {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-left: 0;
  position: relative;
  padding-left: 28px;
}

/* Vertical line connecting children */
.hchildren::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 24px;
  bottom: 24px;
  width: 2px;
  background: var(--tree-line);
}

/* Horizontal connector from vertical line to each child */
.hchildren > .hnode::before {
  content: '';
  position: absolute;
  left: -14px;
  top: 24px;
  width: 14px;
  height: 2px;
  background: var(--tree-line);
}

/* Horizontal connector FROM parent card TO children block */
.hnode > .hconnector {
  width: 28px;
  height: 2px;
  background: var(--tree-line);
  align-self: center;
  margin-top: 24px;
  flex-shrink: 0;
}

/* Card */
.node-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  flex-shrink: 0;
  width: 170px;
  transition: box-shadow 0.15s, border-color 0.15s;
  position: relative;
}
.node-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(9,105,218,0.12);
}
.node-card .thumb {
  width: 100%;
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  display: block;
}
.node-card .route {
  font-size: 10px;
  font-family: "SF Mono", "Fira Code", monospace;
  color: var(--accent);
  margin-top: 4px;
  word-break: break-all;
  line-height: 1.3;
}
.node-card .component {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}
.node-card .label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

/* Collapse toggle */
.toggle-btn {
  position: absolute;
  right: 4px;
  top: 4px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  line-height: 18px;
  text-align: center;
  cursor: pointer;
  color: var(--muted);
  z-index: 2;
  user-select: none;
}
.toggle-btn:hover { background: var(--border); color: var(--text); }

/* Collapsed state */
.hchildren.collapsed {
  display: none;
}
.hconnector.collapsed {
  display: none;
}

/* Section labels */
.section-label {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 6px;
}
.section-label.doctor { background: #dafbe1; color: var(--green); }
.section-label.patient { background: #dbeafe; color: var(--accent); }
.section-label.admin { background: #f3f4f6; color: #6b7280; }

/* Group wrapper */
.group-wrapper {
  margin-bottom: 32px;
}
.group-wrapper .group-row {
  display: flex;
  align-items: flex-start;
}

/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.82);
  align-items: center; justify-content: center; cursor: pointer;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 92vw; max-height: 92vh;
  border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.lightbox-hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.6); font-size: 13px; pointer-events: none;
}

/* Extras row */
.extras {
  margin-top: 40px; padding-top: 24px;
  border-top: 1px solid var(--border);
}
.extras-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }

.footer {
  margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border);
  text-align: center; font-size: 12px; color: var(--muted);
}
</style>
</head>
<body>

<div class="container">
  <h1>Page Tree</h1>
  <p class="subtitle">Horizontal sitemap with screenshots &mdash; click thumbnails to expand, click ▸/▾ to collapse subtrees</p>

  <div class="stats-bar">
    <div class="stat"><span class="stat-value">22</span><span class="stat-label">Total Pages</span></div>
    <div class="stat"><span class="stat-value doctor">13</span><span class="stat-label">Doctor Pages</span></div>
    <div class="stat"><span class="stat-value patient">5</span><span class="stat-label">Patient Pages</span></div>
  </div>

  <div id="tree-root"></div>

  <div class="extras">
    <span class="section-label admin">Admin &amp; Debug</span>
    <div class="extras-grid" id="extras"></div>
  </div>

  <div class="footer">Generated from live debug app screenshots &mdash; Doctor AI Agent</div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="Full screenshot">
  <span class="lightbox-hint">Click or press Escape to close</span>
</div>

<script>
var IMG = 'page-screenshots/';

var TREE = {
  img: 'login.png', route: '/login', comp: 'LoginPage', label: 'Login', children: [
    { label: 'Doctor App', labelClass: 'doctor', sectionOnly: true, children: [
      { img: 'doctor-home.png', route: '/doctor', comp: 'MyAIPage', label: '我的AI', children: [
        { img: 'doctor-chat.png', route: '/doctor/chat', comp: 'ChatPage', label: 'AI Chat' },
        { img: 'doctor-tasks.png', route: '/doctor/tasks', comp: 'TasksPage', label: '任务' },
      ]},
      { img: 'doctor-patients.png', route: '/doctor/patients', comp: 'PatientsPage', label: '患者', children: [
        { img: 'doctor-patients-1.png', route: '/doctor/patients/:id', comp: 'PatientDetail', label: '患者详情' },
        { img: 'doctor-patients-new.png', route: '/doctor/patients/new', comp: 'InterviewPage', label: '新建病历' },
      ]},
      { img: 'doctor-review.png', route: '/doctor/review', comp: 'ReviewQueuePage', label: '审核' },
      { img: 'doctor-followup.png', route: '/doctor/followup', comp: 'FollowupPage', label: '随访' },
      { img: 'doctor-settings.png', route: '/doctor/settings', comp: 'SettingsPage', label: '设置', children: [
        { img: 'doctor-settings-knowledge.png', route: '/settings/knowledge', comp: 'KnowledgeSubpage', label: '知识库', children: [
          { img: 'doctor-settings-knowledge-add.png', route: '/settings/knowledge/add', comp: 'AddKnowledgeSubpage', label: '添加知识' },
        ]},
        { img: 'doctor-settings-template.png', route: '/settings/template', comp: 'TemplateSubpage', label: '报告模板' },
        { img: 'doctor-settings-about.png', route: '/settings/about', comp: 'AboutSubpage', label: '关于' },
      ]},
    ]},
    { label: 'Patient App', labelClass: 'patient', sectionOnly: true, children: [
      { img: 'debug-patient.png', route: '/patient', comp: 'ChatTab', label: '消息' },
      { img: 'debug-patient-records.png', route: '/patient/records', comp: 'RecordsTab', label: '病历' },
      { img: 'debug-patient-tasks.png', route: '/patient/tasks', comp: 'TasksTab', label: '任务' },
      { img: 'debug-patient-profile.png', route: '/patient/profile', comp: 'ProfileTab', label: '我的' },
      { img: 'debug-patient-interview.png', route: '/patient/interview', comp: 'InterviewPage', label: '预问诊' },
    ]},
  ]
};

var EXTRAS = [
  { img: 'admin.png', route: '/admin', comp: 'AdminPage', label: 'Admin' },
  { img: 'debug-components.png', route: '/debug/components', comp: 'ComponentShowcase', label: 'Components' },
  { img: 'debug-doctor-components.png', route: '/debug/doctor-components', comp: 'Showcase', label: 'Doctor Components' },
];

function makeCard(node) {
  var card = document.createElement('div');
  card.className = 'node-card';
  if (node.label) {
    var lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = node.label;
    card.appendChild(lbl);
  }
  if (node.img) {
    var img = document.createElement('img');
    img.className = 'thumb';
    img.src = IMG + node.img;
    img.alt = node.comp || '';
    img.loading = 'lazy';
    img.onclick = function(e) { e.stopPropagation(); openLightbox(IMG + node.img); };
    card.appendChild(img);
  }
  if (node.route) {
    var r = document.createElement('div');
    r.className = 'route';
    r.textContent = node.route;
    card.appendChild(r);
  }
  if (node.comp) {
    var c = document.createElement('div');
    c.className = 'component';
    c.textContent = node.comp;
    card.appendChild(c);
  }
  return card;
}

function renderNode(node, parent) {
  var hnode = document.createElement('div');
  hnode.className = 'hnode';

  // Section-only label (no screenshot)
  if (node.sectionOnly) {
    var lbl = document.createElement('div');
    lbl.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;';
    var badge = document.createElement('span');
    badge.className = 'section-label ' + (node.labelClass || '');
    badge.textContent = node.label;
    lbl.appendChild(badge);

    if (node.children && node.children.length) {
      var childCol = document.createElement('div');
      childCol.className = 'hchildren';
      node.children.forEach(function(child) { renderNode(child, childCol); });
      lbl.appendChild(childCol);
    }
    hnode.appendChild(lbl);
    parent.appendChild(hnode);
    return;
  }

  // Card
  var card = makeCard(node);
  var hasChildren = node.children && node.children.length;

  // Add collapse toggle
  if (hasChildren) {
    var btn = document.createElement('div');
    btn.className = 'toggle-btn';
    btn.textContent = '▾';
    btn.onclick = function(e) {
      e.stopPropagation();
      var connector = hnode.querySelector(':scope > .hconnector');
      var children = hnode.querySelector(':scope > .hchildren');
      if (!children) return;
      var collapsed = children.classList.toggle('collapsed');
      if (connector) connector.classList.toggle('collapsed', collapsed);
      btn.textContent = collapsed ? '▸' : '▾';
    };
    card.appendChild(btn);
  }

  hnode.appendChild(card);

  // Connector + children
  if (hasChildren) {
    var conn = document.createElement('div');
    conn.className = 'hconnector';
    hnode.appendChild(conn);

    var childCol = document.createElement('div');
    childCol.className = 'hchildren';
    node.children.forEach(function(child) { renderNode(child, childCol); });
    hnode.appendChild(childCol);
  }

  parent.appendChild(hnode);
}

function renderExtras() {
  var el = document.getElementById('extras');
  EXTRAS.forEach(function(node) { el.appendChild(makeCard(node)); });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

// Init
renderNode(TREE, document.getElementById('tree-root'));
renderExtras();
</script>

</body>
</html>
