<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component Sharing — Force Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f6f8fa;
  color: #1f2328;
  overflow: hidden;
  height: 100vh;
}

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid #d0d7de;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 20px;
}
.header h1 { font-size: 18px; font-weight: 700; }
.legend { display: flex; gap: 14px; font-size: 11px; color: #656d76; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }

canvas { display: block; cursor: grab; }
canvas.dragging { cursor: grabbing; }

.tooltip {
  display: none; position: fixed; z-index: 20;
  background: #1f2328; color: #fff; padding: 8px 12px;
  border-radius: 8px; font-size: 12px; max-width: 280px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2); pointer-events: none;
}
.tooltip .t-label { font-weight: 700; font-size: 13px; }
.tooltip .t-type { color: #8b949e; font-size: 11px; }
.tooltip .t-links { margin-top: 5px; border-top: 1px solid #444; padding-top: 4px; }
.tooltip .t-link { font-size: 11px; color: #e6edf3; margin-top: 1px; }

.info {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: #656d76; background: rgba(255,255,255,0.9);
  padding: 5px 14px; border-radius: 16px; border: 1px solid #d0d7de;
}
</style>
</head>
<body>

<div class="header">
  <h1>Component Sharing Graph</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1a7f37"></div> Page</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0969da"></div> Shared Component</div>
    <div class="legend-item" style="margin-left:12px;"><span style="display:inline-block;width:16px;height:0;border-top:1.5px solid #656d76;vertical-align:middle;"></span> uses</div>
  </div>
</div>

<canvas id="canvas"></canvas>
<div class="tooltip" id="tooltip"></div>
<div class="info">Drag nodes to rearrange &middot; Hover to see connections</div>

<script>
var COLORS = { page: '#1a7f37', component: '#0969da' };
var NODE_R = 6;

// ── Data ──
var PAGES = [
  { id: 'p_myai', label: 'MyAI', type: 'page', gx: 0.12, gy: 0.20 },
  { id: 'p_patients', label: 'Patients', type: 'page', gx: 0.12, gy: 0.40 },
  { id: 'p_review_pending', label: '审核·门诊', type: 'page', gx: 0.12, gy: 0.55 },
  { id: 'p_review_replies', label: '审核·回复', type: 'page', gx: 0.12, gy: 0.68 },
  { id: 'p_review_done', label: '审核·完成', type: 'page', gx: 0.12, gy: 0.80 },
  { id: 'p_tasks_pending', label: '任务·待完成', type: 'page', gx: 0.35, gy: 0.85 },
  { id: 'p_tasks_done', label: '任务·已完成', type: 'page', gx: 0.50, gy: 0.85 },
  { id: 'p_settings', label: 'Settings', type: 'page', gx: 0.88, gy: 0.20 },
  { id: 'p_knowledge', label: '知识库', type: 'page', gx: 0.88, gy: 0.40 },
  { id: 'p_review_detail', label: '诊断审核', type: 'page', gx: 0.35, gy: 0.15 },
  { id: 'p_patient_detail', label: 'PatientDetail', type: 'page', gx: 0.60, gy: 0.15 },
  { id: 'p_interview', label: 'Interview', type: 'page', gx: 0.88, gy: 0.60 },
  { id: 'p_chat', label: 'Chat', type: 'page', gx: 0.88, gy: 0.78 },
];

var COMPONENTS = [
  { id: 'c_subpage_header', label: 'SubpageHeader', type: 'component', gx: 0.50, gy: 0.30 },
  { id: 'c_listcard', label: 'ListCard', type: 'component', gx: 0.40, gy: 0.40 },
  { id: 'c_action_row', label: 'ActionRow', type: 'component', gx: 0.30, gy: 0.70 },
  { id: 'c_knowledge_card', label: 'KnowledgeCard', type: 'component', gx: 0.50, gy: 0.45 },
  { id: 'c_message_item', label: 'MessageItem', type: 'component', gx: 0.35, gy: 0.55 },
  { id: 'c_diagnosis_card', label: 'DiagnosisCard', type: 'component', gx: 0.50, gy: 0.20 },
  { id: 'c_icon_badge', label: 'IconBadge', type: 'component', gx: 0.60, gy: 0.50 },
  { id: 'c_sheet_dialog', label: 'SheetDialog', type: 'component', gx: 0.25, gy: 0.45 },
  { id: 'c_voice_input', label: 'VoiceInput', type: 'component', gx: 0.75, gy: 0.65 },
  { id: 'c_patient_avatar', label: 'PatientAvatar', type: 'component', gx: 0.40, gy: 0.28 },
  { id: 'c_empty_state', label: 'EmptyState', type: 'component', gx: 0.65, gy: 0.75 },
];

var NODES = PAGES.concat(COMPONENTS);

var EDGES = [
  // SubpageHeader
  { from: 'p_myai', to: 'c_subpage_header' },
  { from: 'p_patients', to: 'c_subpage_header' },
  { from: 'p_review_pending', to: 'c_subpage_header' },
  { from: 'p_tasks_pending', to: 'c_subpage_header' },
  { from: 'p_settings', to: 'c_subpage_header' },
  { from: 'p_review_detail', to: 'c_subpage_header' },
  { from: 'p_knowledge', to: 'c_subpage_header' },
  { from: 'p_interview', to: 'c_subpage_header' },
  // ListCard
  { from: 'p_myai', to: 'c_listcard' },
  { from: 'p_patients', to: 'c_listcard' },
  { from: 'p_settings', to: 'c_listcard' },
  { from: 'p_knowledge', to: 'c_listcard' },
  // ActionRow
  { from: 'p_review_done', to: 'c_action_row' },
  { from: 'p_tasks_pending', to: 'c_action_row' },
  { from: 'p_tasks_done', to: 'c_action_row' },
  // KnowledgeCard
  { from: 'p_myai', to: 'c_knowledge_card' },
  { from: 'p_knowledge', to: 'c_knowledge_card' },
  // MessageItem
  { from: 'p_review_replies', to: 'c_message_item' },
  { from: 'p_patient_detail', to: 'c_message_item' },
  // DiagnosisCard
  { from: 'p_review_detail', to: 'c_diagnosis_card' },
  // IconBadge
  { from: 'p_myai', to: 'c_icon_badge' },
  { from: 'p_review_pending', to: 'c_icon_badge' },
  { from: 'p_review_detail', to: 'c_icon_badge' },
  { from: 'p_knowledge', to: 'c_icon_badge' },
  // SheetDialog
  { from: 'p_review_replies', to: 'c_sheet_dialog' },
  { from: 'p_knowledge', to: 'c_sheet_dialog' },
  { from: 'p_review_detail', to: 'c_sheet_dialog' },
  // VoiceInput
  { from: 'p_interview', to: 'c_voice_input' },
  { from: 'p_chat', to: 'c_voice_input' },
  // PatientAvatar
  { from: 'p_myai', to: 'c_patient_avatar' },
  { from: 'p_review_pending', to: 'c_patient_avatar' },
  { from: 'p_patient_detail', to: 'c_patient_avatar' },
  { from: 'p_patients', to: 'c_patient_avatar' },
  // EmptyState
  { from: 'p_review_pending', to: 'c_empty_state' },
  { from: 'p_review_replies', to: 'c_empty_state' },
  { from: 'p_tasks_pending', to: 'c_empty_state' },
  { from: 'p_knowledge', to: 'c_empty_state' },
];

// ── State ──
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var W, H;
var nodeMap = {};
var dragging = null, dragOff = { x: 0, y: 0 };
var hover = null;

NODES.forEach(function(n) { nodeMap[n.id] = n; });

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  NODES.forEach(function(n) {
    if (!n._dragged) {
      n.x = n.gx * W;
      n.y = n.gy * H;
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Edges
  EDGES.forEach(function(e) {
    var a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    var isHover = hover && (hover.id === e.from || hover.id === e.to);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = isHover ? '#656d76' : '#d0d7de';
    ctx.lineWidth = isHover ? 2 : 1;
    ctx.globalAlpha = isHover ? 0.8 : 0.3;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Nodes
  NODES.forEach(function(n) {
    var isHover = hover && hover.id === n.id;
    var isConnected = false;
    if (hover) {
      EDGES.forEach(function(e) {
        if ((e.from === hover.id && e.to === n.id) || (e.to === hover.id && e.from === n.id)) isConnected = true;
      });
    }
    var dim = hover && !isHover && !isConnected;
    var color = n.type === 'page' ? COLORS.page : COLORS.component;
    var r = n.type === 'page' ? NODE_R + 2 : NODE_R;

    // Count connections
    var connCount = 0;
    EDGES.forEach(function(e) { if (e.from === n.id || e.to === n.id) connCount++; });
    r = r + Math.min(connCount * 0.8, 6);

    if (isHover) {
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 8;
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = dim ? '#e8e8e8' : color;
    ctx.globalAlpha = dim ? 0.3 : 1;
    ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    if (isHover || isConnected) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Label
    ctx.font = (isHover ? 'bold ' : '') + '11px -apple-system, sans-serif';
    ctx.fillStyle = dim ? '#d0d0d0' : '#1f2328';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(n.label, n.x, n.y + r + 4);
  });
}

// ── Interaction ──
function getNode(mx, my) {
  for (var i = NODES.length - 1; i >= 0; i--) {
    var n = NODES[i];
    var dx = mx - n.x, dy = my - n.y;
    var r = (n.type === 'page' ? NODE_R + 2 : NODE_R) + 6;
    if (dx * dx + dy * dy < r * r * 4) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', function(e) {
  var n = getNode(e.clientX, e.clientY);
  if (n) {
    dragging = n;
    dragOff.x = e.clientX - n.x;
    dragOff.y = e.clientY - n.y;
    canvas.classList.add('dragging');
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (dragging) {
    dragging.x = e.clientX - dragOff.x;
    dragging.y = e.clientY - dragOff.y;
    dragging._dragged = true;
    draw();
    return;
  }
  var n = getNode(e.clientX, e.clientY);
  if (n !== hover) { hover = n; draw(); }

  var tip = document.getElementById('tooltip');
  if (n) {
    canvas.style.cursor = 'pointer';
    var html = '<div class="t-label">' + n.label + '</div>';
    html += '<div class="t-type">' + (n.type === 'page' ? 'Page' : 'Shared Component') + '</div>';
    var links = [];
    EDGES.forEach(function(e) {
      if (e.from === n.id) links.push('→ ' + (nodeMap[e.to] || {}).label);
      if (e.to === n.id) links.push('← ' + (nodeMap[e.from] || {}).label);
    });
    if (links.length) html += '<div class="t-links">' + links.map(function(l) { return '<div class="t-link">' + l + '</div>'; }).join('') + '</div>';
    tip.innerHTML = html;
    tip.style.display = 'block';
    tip.style.left = Math.min(e.clientX + 16, W - 290) + 'px';
    tip.style.top = Math.min(e.clientY + 16, H - tip.offsetHeight - 20) + 'px';
  } else {
    canvas.style.cursor = 'grab';
    tip.style.display = 'none';
  }
});

canvas.addEventListener('mouseup', function() {
  dragging = null;
  canvas.classList.remove('dragging');
});

// ── Force simulation (simple spring layout) ──
function simulate() {
  var iterations = 100;
  for (var iter = 0; iter < iterations; iter++) {
    // Repulsion between all nodes
    for (var i = 0; i < NODES.length; i++) {
      for (var j = i + 1; j < NODES.length; j++) {
        var a = NODES[i], b = NODES[j];
        if (a._dragged || b._dragged) continue;
        var dx = b.x - a.x, dy = b.y - a.y;
        var d = Math.sqrt(dx * dx + dy * dy) || 1;
        var force = 800 / (d * d);
        var fx = dx / d * force, fy = dy / d * force;
        if (!a._dragged) { a.x -= fx; a.y -= fy; }
        if (!b._dragged) { b.x += fx; b.y += fy; }
      }
    }
    // Attraction along edges
    EDGES.forEach(function(e) {
      var a = nodeMap[e.from], b = nodeMap[e.to];
      if (!a || !b) return;
      var dx = b.x - a.x, dy = b.y - a.y;
      var d = Math.sqrt(dx * dx + dy * dy) || 1;
      var force = (d - 120) * 0.01;
      var fx = dx / d * force, fy = dy / d * force;
      if (!a._dragged) { a.x += fx; a.y += fy; }
      if (!b._dragged) { b.x -= fx; b.y -= fy; }
    });
    // Gravity toward center
    NODES.forEach(function(n) {
      if (n._dragged) return;
      n.x += (W / 2 - n.x) * 0.005;
      n.y += (H / 2 - n.y) * 0.005;
    });
  }
}

// ── Init ──
resize();
window.addEventListener('resize', function() { resize(); simulate(); draw(); });
simulate();
draw();
</script>

</body>
</html>
