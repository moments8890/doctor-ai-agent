<title>Component Matrix — Visual Catalog + Page Usage</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: #fff; color: #1f2328; }

.header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
  padding: 12px 24px 0;
}
.header h1 { font-size: 16px; font-weight: 600; text-align: center; color: #1A1A1A; }
.header p { font-size: 12px; color: #999; margin-top: 4px; text-align: center; }
/* FilterBar-style tabs: count on top, label below, amber active bar */
.tab-bar { display: flex; margin-top: 8px; border-bottom: 0.5px solid #f0f0f0; }
.tab {
  flex: 1; text-align: center; padding: 8px 0 10px; cursor: pointer;
  border-bottom: 3px solid transparent; margin-bottom: -0.5px;
}
.tab-count { font-size: 16px; font-weight: 700; color: #999; line-height: 1.3; }
.tab-label { font-size: 12px; color: #999; margin-top: 2px; }
.tab:hover .tab-count { color: #666; }
.tab:hover .tab-label { color: #666; }
.tab.active .tab-count { color: #F59E0B; }
.tab.active .tab-label { color: #1A1A1A; font-weight: 600; }
.tab.active { border-bottom-color: #F59E0B; }

/* ── Catalog ── */
.catalog { padding: 16px 24px; display: none; }
.catalog.show { display: block; }
.cat-section { margin-bottom: 24px; }
.cat-title { font-size: 13px; font-weight: 700; color: #656d76; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.cat-title .dot { width: 8px; height: 8px; border-radius: 50%; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.comp-card {
  border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.comp-card:hover { border-color: #07C160; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.comp-card.active { border-color: #07C160; box-shadow: 0 0 0 2px rgba(7,193,96,0.3); }
.comp-preview { padding: 12px; background: #ededed; min-height: 48px; display: flex; align-items: center; justify-content: center; }
.comp-meta { padding: 8px 12px; background: #fff; border-top: 1px solid #f0f0f0; }
.comp-name { font-size: 12px; font-weight: 700; color: #1f2328; }
.comp-file { font-size: 10px; color: #0969da; font-family: monospace; margin-top: 2px; }
.comp-pages { font-size: 10px; color: #656d76; margin-top: 3px; }
.comp-pages strong { color: #07C160; }

/* ── Mini component mockups (inside .comp-preview) ── */
.m { font-family: 'Noto Sans SC', sans-serif; }
.m-row { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 4px; padding: 6px 8px; width: 100%; font-size: 11px; }
.m-avatar { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.m-body { flex: 1; min-width: 0; }
.m-title { font-size: 11px; font-weight: 600; color: #1A1A1A; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.m-sub { font-size: 9px; color: #999; }
.m-right { font-size: 9px; color: #999; flex-shrink: 0; }
.m-btn { display: inline-flex; align-items: center; justify-content: center; padding: 4px 12px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.m-btn-primary { background: #07C160; color: #fff; }
.m-btn-secondary { background: #fff; color: #333; border: 1px solid #ccc; }
.m-btn-danger { background: #fff; color: #D65745; border: 1px solid #D65745; }
.m-dialog { background: #fff; border-radius: 12px; padding: 12px; width: 100%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
.m-dialog-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.m-dialog-msg { font-size: 10px; color: #666; margin-bottom: 8px; }
.m-dialog-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.m-badge { display: inline-block; font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 4px; border: 0.5px solid; }
.m-empty { text-align: center; padding: 8px; color: #999; font-size: 10px; }
.m-spinner { width: 16px; height: 16px; border: 2px solid #e5e5e5; border-top-color: #999; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.m-toast { background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px; border-radius: 8px; font-size: 10px; }
.m-header { display: flex; align-items: center; gap: 6px; background: #fff; border-radius: 4px; padding: 6px 8px; width: 100%; border-bottom: 0.5px solid #d9d9d9; }
.m-header-back { font-size: 14px; color: #333; }
.m-header-title { flex: 1; text-align: center; font-size: 12px; font-weight: 600; }
.m-header-action { font-size: 11px; color: #07C160; }
.m-section-label { font-size: 9px; font-weight: 600; color: #666; letter-spacing: 0.3px; padding: 4px 0; }
.m-chip { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 500; }
.m-chip-active { background: #07C160; color: #fff; }
.m-chip-inactive { background: #fff; color: #999; border: 1px solid #ccc; }
.m-record { background: #fff; border-radius: 4px; padding: 6px 8px; width: 100%; font-size: 10px; border-left: 3px solid #07C160; }
.m-voice { display: flex; align-items: center; gap: 4px; background: #fff; border-radius: 4px; padding: 6px 10px; color: #999; font-size: 10px; }
.m-voice-dot { width: 8px; height: 8px; border-radius: 50%; background: #D65745; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.m-timeline { display: flex; gap: 6px; width: 100%; }
.m-timeline-rail { width: 2px; background: #f0f0f0; flex-shrink: 0; min-height: 40px; }
.m-timeline-content { flex: 1; }
.m-bubble { background: #fff; border-radius: 6px; padding: 4px 8px; font-size: 10px; color: #333; margin-bottom: 4px; }
.m-filter { display: flex; gap: 4px; background: #fff; border-radius: 4px; padding: 4px 6px; width: 100%; }
.m-diag { background: #fff; border-radius: 4px; padding: 6px 8px; width: 100%; border-left: 3px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
.m-diag-title { font-size: 11px; font-weight: 600; }
.m-diag-status { font-size: 9px; color: #999; }
.m-action-row { display: flex; align-items: center; gap: 6px; background: #fff; border-radius: 4px; padding: 6px 8px; width: 100%; }
.m-checkbox { width: 14px; height: 14px; border: 1.5px solid #ccc; border-radius: 50%; flex-shrink: 0; }
.m-checkbox.checked { background: #07C160; border-color: #07C160; }

/* ── Matrix ── */
.matrix-section { padding: 16px 24px 24px; display: none; }
.matrix-section.show { display: block; }
.matrix-wrap { overflow-x: auto; }
table { border-collapse: collapse; font-size: 12px; width: auto; }
th, td { padding: 6px 10px; border: 1px solid #e5e5e5; text-align: center; white-space: nowrap; }
th { background: #f6f8fa; font-weight: 600; color: #1f2328; position: sticky; top: 72px; z-index: 5; }
th.corner { position: sticky; left: 0; top: 72px; z-index: 7; background: #f6f8fa; }
td.row-label { text-align: left; font-weight: 500; color: #0969da; position: sticky; left: 0; background: #fff; z-index: 3; min-width: 160px; cursor: pointer; }
td.row-label:hover { color: #0550ae; text-decoration: underline; }
td.row-label.active-comp { background: #ddf4ff; font-weight: 700; }
th.page-col { writing-mode: vertical-lr; text-orientation: mixed; padding: 10px 6px; font-size: 11px; min-width: 36px; cursor: pointer; color: #1a7f37; }
th.page-col:hover { color: #07C160; }
th.page-col.highlighted { background: #dafbe1; color: #1a7f37; font-weight: 700; }
td.dot { cursor: default; }
.dot-on { width: 14px; height: 14px; border-radius: 50%; background: #07C160; display: inline-block; }
.dot-off { color: #e5e5e5; }

.footer { text-align: center; padding: 24px; color: #656d76; font-size: 11px; border-top: 1px solid #e5e5e5; margin-top: 24px; }
</style>

// ── Build component catalog ──
var catalogEl = document.getElementById('catalog');
var compPageCount = {};
CATALOG.forEach(function(sec) {
  sec.items.forEach(function(item) {
    var count = 0;
    PAGES.forEach(function(p) { if (p.comps.indexOf(item.name) >= 0) count++; });
    compPageCount[item.name] = count;
  });
});

CATALOG.forEach(function(sec) {
  var html = '<div class="cat-section">';
  html += '<div class="cat-title"><span class="dot" style="background:' + sec.color + '"></span>' + sec.section + '</div>';
  html += '<div class="cat-grid">';
  sec.items.forEach(function(item) {
    var pages = [];
    PAGES.forEach(function(p) { if (p.comps.indexOf(item.name) >= 0) pages.push(p.label); });
    html += '<div class="comp-card" data-comp="' + item.name + '" onclick="selectComp(\'' + item.name + '\')">';
    html += '<div class="comp-preview">' + item.html + '</div>';
    html += '<div class="comp-meta">';
    html += '<div class="comp-name">' + item.name + '</div>';
    html += '<div class="comp-file">src/components/' + item.file + '</div>';
    html += '<div class="comp-pages">Used in <strong>' + compPageCount[item.name] + '</strong> pages: ' + pages.join(', ') + '</div>';
    html += '</div></div>';
  });
  html += '</div></div>';
  catalogEl.innerHTML += html;
});

// ── Build matrix ──
var COMPONENTS = [];
CATALOG.forEach(function(sec) { sec.items.forEach(function(item) { COMPONENTS.push(item.name); }); });

var wrap = document.getElementById('matrix-wrap');
var html = '<table><thead><tr><th class="corner">Component \\ Page</th>';
PAGES.forEach(function(p) {
  html += '<th class="page-col" data-page="' + p.id + '">' + p.label + '</th>';
});
html += '</tr></thead><tbody>';
COMPONENTS.forEach(function(comp) {
  html += '<tr><td class="row-label" data-comp="' + comp + '">' + comp + '</td>';
  PAGES.forEach(function(p) {
    var has = p.comps.indexOf(comp) >= 0;
    html += '<td class="dot">' + (has ? '<span class="dot-on"></span>' : '<span class="dot-off">&middot;</span>') + '</td>';
  });
  html += '</tr>';
});
html += '</tbody></table>';
wrap.innerHTML = html;

// ── Interactions ──
var activeComp = null;

function selectComp(comp) {
  var isSame = activeComp === comp;
  activeComp = isSame ? null : comp;
  // Reset
  document.querySelectorAll('.comp-card').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.row-label').forEach(function(el) { el.classList.remove('active-comp'); });
  document.querySelectorAll('th.page-col').forEach(function(el) { el.classList.remove('highlighted'); });
  if (!isSame) {
    document.querySelectorAll('.comp-card[data-comp="' + comp + '"]').forEach(function(el) { el.classList.add('active'); });
    document.querySelectorAll('.row-label[data-comp="' + comp + '"]').forEach(function(el) { el.classList.add('active-comp'); });
    var usingPages = {};
    PAGES.forEach(function(p) { if (p.comps.indexOf(comp) >= 0) usingPages[p.id] = true; });
    document.querySelectorAll('th.page-col').forEach(function(el) {
      if (usingPages[el.dataset.page]) el.classList.add('highlighted');
    });
  }
}

// Matrix row click -> select comp
document.addEventListener('click', function(e) {
  var label = e.target.closest('.row-label');
  if (label && label.dataset.comp) {
    selectComp(label.dataset.comp);
    // Scroll catalog card into view
    var card = document.querySelector('.comp-card[data-comp="' + label.dataset.comp + '"]');
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
});

// Tab switching
function showTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('catalog').classList.toggle('show', tab === 'catalog');
  document.getElementById('matrix-section').classList.toggle('show', tab === 'matrix');
}

// Set dynamic counts
document.getElementById('tab-catalog-count').textContent = COMPONENTS.length;
document.getElementById('tab-matrix-count').textContent = PAGES.length;
</script>
