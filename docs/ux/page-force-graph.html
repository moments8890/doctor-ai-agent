<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Navigation — Force Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f6f8fa;
  color: #1f2328;
  overflow: hidden;
  height: 100vh;
}

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid #d0d7de;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 20px;
}
.header h1 { font-size: 18px; font-weight: 700; }
.legend { display: flex; gap: 14px; font-size: 11px; color: #656d76; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }
.legend-line { width: 20px; height: 0; border-top: 2px solid; }
.legend-line.dashed { border-top-style: dashed; }

.filters { display: flex; gap: 5px; margin-left: auto; }
.filter-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 12px;
  border: 1px solid #d0d7de; background: #fff; cursor: pointer;
  font-weight: 500; color: #656d76; transition: all 0.15s;
}
.filter-btn:hover { border-color: #0969da; color: #0969da; }
.filter-btn.active { background: #0969da; color: #fff; border-color: #0969da; }

canvas { display: block; cursor: grab; }
canvas.dragging { cursor: grabbing; }

.tooltip {
  display: none; position: fixed; z-index: 20;
  background: #1f2328; color: #fff; padding: 8px 12px;
  border-radius: 8px; font-size: 12px; max-width: 280px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2); pointer-events: none;
}
.tooltip .t-label { font-weight: 700; font-size: 13px; }
.tooltip .t-route { font-family: "SF Mono", monospace; color: #79c0ff; font-size: 11px; }
.tooltip .t-comp { color: #8b949e; font-size: 11px; }
.tooltip .t-links { margin-top: 5px; border-top: 1px solid #444; padding-top: 4px; }
.tooltip .t-link { font-size: 11px; color: #e6edf3; margin-top: 1px; }

.lightbox {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.85); align-items: center;
  justify-content: center; cursor: pointer;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 90vh; border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.info {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: #656d76; background: rgba(255,255,255,0.9);
  padding: 5px 14px; border-radius: 16px; border: 1px solid #d0d7de;
}
</style>
</head>
<body>

<div class="header">
  <h1>Navigation Graph</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1a7f37"></div> Nav tab</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0969da"></div> Main page</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8250df"></div> Subpage</div>
    <div class="legend-item"><div class="legend-dot" style="background:#bc4c00"></div> Detail</div>
    <div class="legend-item"><div class="legend-line" style="border-color:#1a7f37"></div> Nav</div>
    <div class="legend-item"><div class="legend-line" style="border-color:#0969da"></div> Drill</div>
    <div class="legend-item"><div class="legend-line dashed" style="border-color:#bc4c00"></div> Cross</div>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="doctor">Doctor App</button>
    <button class="filter-btn" data-filter="patient">Patient App</button>
    <button class="filter-btn" data-filter="debug">Debug / Admin</button>
    <button class="filter-btn" data-filter="all">All</button>
    <button class="filter-btn" data-filter="cross">Cross-links</button>
  </div>
</div>

<canvas id="canvas"></canvas>
<div class="tooltip" id="tooltip"></div>
<div class="info">Drag nodes to rearrange · Click for full screenshot · Hover for connections</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
  <img id="lb-img" src="">
</div>

<script>
var IMG = 'page-screenshots/';
var NODE_R = 40;
var EDGE_COLORS = { nav: '#1a7f37', drill: '#0969da', cross: '#bc4c00' };

// ── Nodes with FIXED grid positions ──
// Layout: Doctor app left, Patient app right, Standalone bottom-center
// Rows: layer 0 (nav tabs) at top, layer 1 (main) below, etc.
// Positions are ratios of viewport (0-1) — computed to pixels on resize

var NODES = [

  { id: 'myai',     label: '我的AI',   route: '/doctor',           comp: 'MyAIPage',        img: 'doctor-home.png',     app: 'doctor', color: '#1a7f37', gx: 0.10, gy: 0.14 },
  { id: 'patients', label: '患者',     route: '/doctor/patients',   comp: 'PatientsPage',    img: 'doctor-patients.png', app: 'doctor', color: '#1a7f37', gx: 0.26, gy: 0.14 },
  { id: 'review',   label: '审核',     route: '/doctor/review',     comp: 'ReviewQueuePage', img: 'doctor-review.png',   app: 'doctor', color: '#1a7f37', gx: 0.42, gy: 0.14 },
  { id: 'tasks',    label: '任务',     route: '/doctor/tasks',      comp: 'TaskPage',        img: 'doctor-tasks.png', app: 'doctor', color: '#1a7f37', gx: 0.56, gy: 0.14 },
  // Doctor main pages — row 1
  { id: 'chat',     label: 'AI Chat ⚠', route: '/doctor/chat',       comp: 'ChatPage',        img: 'doctor-chat.png',     app: 'doctor', color: '#9a6700', gx: 0.06, gy: 0.40, reason: 'No nav tab. Reachable via AskAIBar and navigate() calls only.' },
  { id: 'settings', label: '设置',     route: '/doctor/settings',   comp: 'SettingsPage',    img: 'doctor-settings.png', app: 'doctor', color: '#0969da', gx: 0.28, gy: 0.40 },
  // Doctor subpages — row 2
  { id: 'patient-detail', label: '患者详情',  route: '/patients/:id',   comp: 'PatientDetail',      img: 'doctor-patients-1.png',          app: 'doctor', color: '#8250df', gx: 0.10, gy: 0.66 },
  { id: 'intake',      label: '新建病历',  route: '/patients/new',   comp: 'IntakePage',      img: 'doctor-patients-new.png',        app: 'doctor', color: '#8250df', gx: 0.24, gy: 0.66 },
  { id: 'knowledge',      label: '知识库',    route: '/settings/knowledge', comp: 'KnowledgeSubpage', img: 'doctor-settings-knowledge.png', app: 'doctor', color: '#8250df', gx: 0.38, gy: 0.66 },
  { id: 'template',       label: '报告模板',  route: '/settings/template',  comp: 'TemplateSubpage',  img: 'doctor-settings-template.png',  app: 'doctor', color: '#8250df', gx: 0.50, gy: 0.66 },
  { id: 'about',          label: '关于',      route: '/settings/about',     comp: 'AboutSubpage',     img: 'doctor-settings-about.png',     app: 'doctor', color: '#8250df', gx: 0.62, gy: 0.66 },
  { id: 'review-detail', label: '诊断审核',  route: '/review/:id',  comp: 'ReviewPage',      img: 'doctor-review-detail.png',       app: 'doctor', color: '#8250df', gx: 0.50, gy: 0.66 },
  { id: 'patient-chat',    label: '患者消息',  route: '/patients/:id?view=chat',   comp: 'PatientChatPage',    img: 'doctor-patients-chat.png', app: 'doctor', color: '#8250df', gx: 0.16, gy: 0.82 },
  { id: 'record-detail',   label: '病历详情',  route: '/patients/:id?view=record&record=:rid', comp: 'RecordDetailSubpage', img: null, app: 'doctor', color: '#bc4c00', gx: 0.30, gy: 0.82 },
  // Doctor detail — row 3
  { id: 'knowledge-add',  label: '添加知识',  route: '/knowledge/add',  comp: 'AddKnowledgeSubpage', img: 'doctor-settings-knowledge-add.png', app: 'doctor', color: '#bc4c00', gx: 0.44, gy: 0.88 },
  // Patient nav — right column
  { id: 'p-chat',      label: '消息',   route: '/patient',          comp: 'ChatTab',        img: 'patient.png',           app: 'patient', color: '#1a7f37', gx: 0.74, gy: 0.14 },
  { id: 'p-records',   label: '病历',   route: '/patient/records',  comp: 'RecordsTab',     img: 'patient-records.png',   app: 'patient', color: '#1a7f37', gx: 0.84, gy: 0.14 },
  { id: 'p-tasks',     label: '任务',   route: '/patient/tasks',    comp: 'TasksTab',       img: 'patient-tasks.png',     app: 'patient', color: '#1a7f37', gx: 0.74, gy: 0.40 },
  { id: 'p-profile',   label: '我的',   route: '/patient/profile',  comp: 'ProfileTab',     img: 'patient-profile.png',   app: 'patient', color: '#1a7f37', gx: 0.84, gy: 0.40 },
  { id: 'p-intake', label: '预问诊', route: '/patient/intake', comp: 'IntakePage', img: 'patient-intake.png', app: 'patient', color: '#8250df', gx: 0.79, gy: 0.66 },
  // Standalone
  { id: 'login', label: 'Login', route: '/login', comp: 'LoginPage', img: 'login.png', app: 'standalone', color: '#656d76', gx: 0.92, gy: 0.88 },
  { id: 'admin', label: 'Admin', route: '/admin', comp: 'AdminPage', img: 'admin.png', app: 'standalone', color: '#656d76', gx: 0.06, gy: 0.88 },
  // Orphaned / semi-dead — no nav tab, reachable only via specific actions or not at all
  { id: 'privacy', label: '隐私政策', route: '/settings/privacy', comp: 'PrivacyPage', img: 'doctor-settings-privacy.png', app: 'doctor', color: '#8250df', gx: 0.74, gy: 0.66 },
  { id: 'showcase', label: 'Components', route: '/debug/components', comp: 'ComponentShowcase', img: 'debug-components.png', app: 'orphan', color: '#cf222e', gx: 0.54, gy: 0.88, orphan: true, reason: 'Debug-only showcase. No in-app navigation, direct URL only.' },
  { id: 'dr-showcase', label: 'Dr Components', route: '/debug/doctor-components', comp: 'Showcase', img: 'debug-doctor-components.png', app: 'orphan', color: '#cf222e', gx: 0.68, gy: 0.88, orphan: true, reason: 'Debug-only showcase. No in-app navigation, direct URL only.' },
];

var EDGES = [
  // Nav tabs (bidirectional shown as single)
  { from: 'myai', to: 'patients', label: 'nav', type: 'nav' },
  { from: 'myai', to: 'review', label: 'nav', type: 'nav' },
  { from: 'myai', to: 'tasks', label: 'nav', type: 'nav' },
  { from: 'patients', to: 'review', label: 'nav', type: 'nav' },
  { from: 'patients', to: 'tasks', label: 'nav', type: 'nav' },
  { from: 'review', to: 'tasks', label: 'nav', type: 'nav' },
  // MyAI drill
  { from: 'myai', to: 'settings', label: '⚙️ icon', type: 'drill' },
  { from: 'myai', to: 'chat', label: 'AskAI bar', type: 'drill' },
  // MyAI cross-links
  { from: 'myai', to: 'knowledge', label: '"继续教AI"', type: 'cross' },
  { from: 'myai', to: 'knowledge-add', label: '"导入病例"', type: 'cross' },
  { from: 'myai', to: 'patient-detail', label: 'activity row', type: 'cross' },
  // Patients drill
  { from: 'patients', to: 'patient-detail', label: 'tap row', type: 'drill' },
  { from: 'patients', to: 'intake', label: '"新建患者"', type: 'drill' },
  // Patient detail drill
  { from: 'patient-detail', to: 'patient-chat', label: '"患者消息"', type: 'drill' },
  { from: 'patient-detail', to: 'record-detail', label: 'tap record', type: 'drill' },
  { from: 'patient-detail', to: 'intake', label: '"新建门诊"', type: 'drill' },
  // Patient detail cross
  { from: 'patient-detail', to: 'review-detail', label: 'pending review', type: 'drill' },
  // Settings drill
  { from: 'settings', to: 'knowledge', label: '"知识库"', type: 'drill' },
  { from: 'settings', to: 'template', label: '"报告模板"', type: 'drill' },
  { from: 'settings', to: 'about', label: '"关于"', type: 'drill' },
  { from: 'settings', to: 'privacy', label: '"隐私政策"', type: 'drill' },
  { from: 'settings', to: 'login', label: '"退出登录"', type: 'drill' },
  // Knowledge drill
  { from: 'knowledge', to: 'knowledge-add', label: '"添加"', type: 'drill' },
  // Review drill
  { from: 'review', to: 'review-detail', label: 'tap review card', type: 'drill' },
  { from: 'patient-detail', to: 'review-detail', label: 'pending review >', type: 'drill' },
  // Review cross-links
  { from: 'review', to: 'patient-chat', label: '待回复 tab', type: 'cross' },
  { from: 'review', to: 'patient-detail', label: 'completed row', type: 'cross' },
  { from: 'tasks', to: 'patient-detail', label: 'tap row', type: 'cross' },
  { from: 'chat', to: 'patient-detail', label: 'patient card', type: 'cross' },
  { from: 'chat', to: 'patients', label: '"查看全部"', type: 'cross' },
  { from: 'chat', to: 'tasks', label: '"查看全部" tasks', type: 'cross' },
  // Login
  { from: 'login', to: 'myai', label: 'doctor login', type: 'drill' },
  { from: 'login', to: 'p-chat', label: 'patient login', type: 'drill' },
  // Patient nav
  { from: 'p-chat', to: 'p-records', label: 'nav', type: 'nav' },
  { from: 'p-chat', to: 'p-tasks', label: 'nav', type: 'nav' },
  { from: 'p-chat', to: 'p-profile', label: 'nav', type: 'nav' },
  { from: 'p-records', to: 'p-tasks', label: 'nav', type: 'nav' },
  // Patient drill
  { from: 'p-chat', to: 'p-intake', label: '"开始提问"', type: 'drill' },
  { from: 'p-records', to: 'p-intake', label: '"新增病历"', type: 'drill' },
];

// ── State ──
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var W, H;
var nodeMap = {};
var images = {};
var dragging = null, dragOff = { x: 0, y: 0 }, wasDragged = false;
var hover = null;
var activeFilter = 'doctor';

NODES.forEach(function(n) { n.visible = n.app === 'doctor'; nodeMap[n.id] = n; });

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  // Recompute positions from grid ratios
  NODES.forEach(function(n) {
    if (!n._dragged) {
      n.x = n.gx * W;
      n.y = n.gy * H;
    }
  });
}

function loadImages() {
  NODES.forEach(function(n) {
    if (n.img) {
      var img = new Image();
      img.src = IMG + n.img;
      images[n.id] = img;
    }
  });
}

// ── Drawing ──
function drawCurvedArrow(ax, ay, bx, by, color, dashed, label, highlight) {
  var dx = bx - ax, dy = by - ay;
  var d = Math.sqrt(dx * dx + dy * dy);
  if (d < 1) return;

  // Shorten to node edge
  var sx = ax + dx / d * (NODE_R + 3);
  var sy = ay + dy / d * (NODE_R + 3);
  var ex = bx - dx / d * (NODE_R + 3);
  var ey = by - dy / d * (NODE_R + 3);

  // Curve control point (offset perpendicular)
  var mx = (sx + ex) / 2;
  var my = (sy + ey) / 2;
  var nx = -(ey - sy);
  var ny = (ex - sx);
  var nd = Math.sqrt(nx * nx + ny * ny);
  var curve = 20;
  var cpx = mx + nx / nd * curve;
  var cpy = my + ny / nd * curve;

  ctx.beginPath();
  ctx.setLineDash(dashed ? [5, 3] : []);
  ctx.moveTo(sx, sy);
  ctx.quadraticCurveTo(cpx, cpy, ex, ey);
  ctx.strokeStyle = color;
  ctx.lineWidth = highlight ? 2.5 : 1.5;
  ctx.globalAlpha = highlight ? 0.85 : 0.2;
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  // Tangent at endpoint of quadratic curve
  var t = 0.98;
  var tanX = 2 * (1 - t) * (cpx - sx) + 2 * t * (ex - cpx);
  var tanY = 2 * (1 - t) * (cpy - sy) + 2 * t * (ey - cpy);
  var angle = Math.atan2(tanY, tanX);
  var aLen = 7;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - aLen * Math.cos(angle - 0.35), ey - aLen * Math.sin(angle - 0.35));
  ctx.lineTo(ex - aLen * Math.cos(angle + 0.35), ey - aLen * Math.sin(angle + 0.35));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Label at midpoint of curve
  if (highlight && label) {
    // Point on curve at t=0.5
    var lx = 0.25 * sx + 0.5 * cpx + 0.25 * ex;
    var ly = 0.25 * sy + 0.5 * cpy + 0.25 * ey;
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    // Background pill
    var tw = ctx.measureText(label).width;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.roundRect(lx - tw / 2 - 4, ly - 7, tw + 8, 14, 4);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, lx, ly);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Group backgrounds
  // Doctor app
  var dNodes = NODES.filter(function(n) { return n.app === 'doctor' && n.visible; });
  if (dNodes.length) {
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    dNodes.forEach(function(n) {
      if (n.x - NODE_R < minX) minX = n.x - NODE_R;
      if (n.y - NODE_R < minY) minY = n.y - NODE_R;
      if (n.x + NODE_R > maxX) maxX = n.x + NODE_R;
      if (n.y + NODE_R > maxY) maxY = n.y + NODE_R;
    });
    ctx.fillStyle = 'rgba(26, 127, 55, 0.03)';
    ctx.strokeStyle = 'rgba(26, 127, 55, 0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(minX - 30, minY - 40, maxX - minX + 60, maxY - minY + 80, 16);
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(26, 127, 55, 0.35)';
    ctx.textAlign = 'left';
    ctx.fillText('DOCTOR APP', minX - 24, minY - 20);
  }

  // Patient app
  var pNodes = NODES.filter(function(n) { return n.app === 'patient' && n.visible; });
  if (pNodes.length) {
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    pNodes.forEach(function(n) {
      if (n.x - NODE_R < minX) minX = n.x - NODE_R;
      if (n.y - NODE_R < minY) minY = n.y - NODE_R;
      if (n.x + NODE_R > maxX) maxX = n.x + NODE_R;
      if (n.y + NODE_R > maxY) maxY = n.y + NODE_R;
    });
    ctx.fillStyle = 'rgba(9, 105, 218, 0.03)';
    ctx.strokeStyle = 'rgba(9, 105, 218, 0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(minX - 30, minY - 40, maxX - minX + 60, maxY - minY + 80, 16);
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(9, 105, 218, 0.35)';
    ctx.textAlign = 'left';
    ctx.fillText('PATIENT APP', minX - 24, minY - 20);
  }

  // Orphan group
  var oNodes = NODES.filter(function(n) { return n.orphan && n.visible; });
  if (oNodes.length) {
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    oNodes.forEach(function(n) {
      if (n.x - NODE_R < minX) minX = n.x - NODE_R;
      if (n.y - NODE_R < minY) minY = n.y - NODE_R;
      if (n.x + NODE_R > maxX) maxX = n.x + NODE_R;
      if (n.y + NODE_R > maxY) maxY = n.y + NODE_R;
    });
    ctx.fillStyle = 'rgba(207, 34, 46, 0.03)';
    ctx.strokeStyle = 'rgba(207, 34, 46, 0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.roundRect(minX - 30, minY - 40, maxX - minX + 60, maxY - minY + 80, 16);
    ctx.fill(); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(207, 34, 46, 0.5)';
    ctx.textAlign = 'left';
    ctx.fillText('ORPHANED / DEAD PAGES', minX - 24, minY - 20);
  }

  // Edges
  EDGES.forEach(function(e) {
    var a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b || !a.visible || !b.visible) return;
    var isHover = hover && (hover.id === e.from || hover.id === e.to);
    var color = EDGE_COLORS[e.type];
    drawCurvedArrow(a.x, a.y, b.x, b.y, color, e.type === 'cross', e.label, isHover);
  });

  // Nodes
  NODES.forEach(function(n) {
    if (!n.visible) return;
    var isHover = hover && hover.id === n.id;
    var isConnected = false;
    if (hover) {
      EDGES.forEach(function(e) {
        if ((e.from === hover.id && e.to === n.id) || (e.to === hover.id && e.from === n.id)) isConnected = true;
      });
    }
    var dim = hover && !isHover && !isConnected;

    // Shadow for hovered
    if (isHover) {
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 12;
    }

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, NODE_R, 0, Math.PI * 2);
    ctx.fillStyle = dim ? '#f5f5f5' : (n.orphan ? '#fff5f5' : '#fff');
    ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    if (n.orphan) ctx.setLineDash([4, 3]);
    ctx.strokeStyle = isHover ? n.color : (dim ? '#e8e8e8' : n.color);
    ctx.lineWidth = isHover ? 3 : 2;
    ctx.globalAlpha = dim ? 0.3 : 1;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // "No screenshot" placeholder for orphans
    if (!n.img) {
      ctx.font = '10px -apple-system, sans-serif';
      ctx.fillStyle = n.orphan ? '#cf222e' : '#999';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.orphan ? '⚠' : '?', n.x, n.y - 4);
      ctx.font = '8px -apple-system, sans-serif';
      ctx.fillText(n.orphan ? 'ORPHAN' : 'no img', n.x, n.y + 8);
    }

    // Screenshot
    var img = images[n.id];
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(n.x, n.y, NODE_R - 3, 0, Math.PI * 2);
      ctx.clip();
      var aspect = img.naturalWidth / img.naturalHeight;
      var dw = (NODE_R - 3) * 2;
      var dh = dw / aspect;
      if (dh < dw) { dh = dw; dw = dh * aspect; }
      ctx.globalAlpha = dim ? 0.15 : 0.8;
      ctx.drawImage(img, n.x - dw / 2, n.y - dh / 2, dw, dh);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Label
    ctx.font = (isHover ? 'bold ' : '') + '12px -apple-system, sans-serif';
    ctx.fillStyle = dim ? '#d0d0d0' : '#1f2328';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(n.label, n.x, n.y + NODE_R + 6);

    // Route
    ctx.font = '9px "SF Mono", monospace';
    ctx.fillStyle = dim ? '#e0e0e0' : '#656d76';
    ctx.fillText(n.route, n.x, n.y + NODE_R + 20);
  });
}

// ── Interaction ──
function getNode(mx, my) {
  for (var i = NODES.length - 1; i >= 0; i--) {
    var n = NODES[i];
    if (!n.visible) continue;
    var dx = mx - n.x, dy = my - n.y;
    if (dx * dx + dy * dy < NODE_R * NODE_R) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', function(e) {
  var n = getNode(e.clientX, e.clientY);
  if (n) {
    dragging = n;
    wasDragged = false;
    dragOff.x = e.clientX - n.x;
    dragOff.y = e.clientY - n.y;
    canvas.classList.add('dragging');
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (dragging) {
    dragging.x = e.clientX - dragOff.x;
    dragging.y = e.clientY - dragOff.y;
    dragging._dragged = true;
    wasDragged = true;
    draw();
    return;
  }
  var n = getNode(e.clientX, e.clientY);
  if (n !== hover) { hover = n; draw(); }

  var tip = document.getElementById('tooltip');
  if (n) {
    canvas.style.cursor = 'pointer';
    var html = '<div class="t-label">' + n.label + (n.orphan ? ' <span style="color:#f85149">⚠ ORPHAN</span>' : '') + '</div>';
    html += '<div class="t-route">' + n.route + '</div>';
    html += '<div class="t-comp">' + n.comp + '</div>';
    if (n.reason) html += '<div style="color:#f85149;font-size:11px;margin-top:4px">' + n.reason + '</div>';
    var links = [];
    EDGES.forEach(function(e) {
      if (e.from === n.id) links.push('→ ' + (nodeMap[e.to] || {}).label + ' <span style="color:#8b949e">(' + e.label + ')</span>');
      if (e.to === n.id) links.push('← ' + (nodeMap[e.from] || {}).label + ' <span style="color:#8b949e">(' + e.label + ')</span>');
    });
    if (links.length) html += '<div class="t-links">' + links.map(function(l) { return '<div class="t-link">' + l + '</div>'; }).join('') + '</div>';
    tip.innerHTML = html;
    tip.style.display = 'block';
    tip.style.left = Math.min(e.clientX + 16, W - 290) + 'px';
    tip.style.top = Math.min(e.clientY + 16, H - tip.offsetHeight - 20) + 'px';
  } else {
    canvas.style.cursor = 'grab';
    tip.style.display = 'none';
  }
});

canvas.addEventListener('mouseup', function() {
  dragging = null;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('click', function(e) {
  if (wasDragged) return;
  var n = getNode(e.clientX, e.clientY);
  if (n && n.img) {
    document.getElementById('lb-img').src = IMG + n.img;
    document.getElementById('lightbox').classList.add('active');
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});

// ── Filters ──
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    NODES.forEach(function(n) {
      if (activeFilter === 'all') n.visible = true;
      else if (activeFilter === 'doctor') n.visible = n.app === 'doctor';
      else if (activeFilter === 'patient') n.visible = n.app === 'patient';
      else if (activeFilter === 'debug') n.visible = n.app === 'standalone' || n.app === 'orphan' || !!n.orphan;
      else if (activeFilter === 'cross') {
        var has = false;
        EDGES.forEach(function(e) { if (e.type === 'cross' && (e.from === n.id || e.to === n.id)) has = true; });
        n.visible = has;
      }
    });
    draw();
  });
});

// ── Init ──
resize();
window.addEventListener('resize', function() { resize(); draw(); });
loadImages();
// Wait for images then draw
setTimeout(draw, 100);
setTimeout(draw, 500);
setTimeout(draw, 1500);
</script>
