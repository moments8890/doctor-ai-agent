<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Doctor AI Agent — UI Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
h1 { font-size: 18px; color: #333; padding: 16px 0 4px; }
.role-switch { display: flex; gap: 6px; margin: 8px 0 12px; }
.role-switch button { padding: 5px 18px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
.role-switch button.active { background: #07C160; color: #fff; border-color: #07C160; }
.phone-frame { width: 375px; height: 812px; border: 8px solid #222; border-radius: 36px; overflow: hidden; background: #fff; box-shadow: 0 8px 30px rgba(0,0,0,0.15); position: relative; }
.phone-frame iframe { width: 100%; height: 100%; border: none; }
.caption { font-size: 12px; color: #999; padding: 6px 0 20px; }
</style>
</head>
<body>
<h1>Doctor AI Agent — UI Prototype</h1>

<div class="role-switch">
  <button class="active" onclick="switchRole('doctor')">医生端</button>
  <button onclick="switchRole('patient')">患者端</button>
</div>

<div class="phone-frame">
  <iframe id="viewer" src="doctor-home_raw.html"></iframe>
</div>
<div class="caption" id="caption">首页</div>

<script>
const DOCTOR_NAV = {
  "首页": "doctor-home_raw.html",
  "患者": "doctor-patients_raw.html",
  "任务": "doctor-tasks_raw.html",
  "设置": "doctor-settings_raw.html",
};
const PATIENT_NAV = {
  "主页": "patient-home_raw.html",
  "病历": "patient-records_raw.html",
  "任务": "patient-tasks_raw.html",
  "设置": "patient-settings_raw.html",
};

/* Patient name → detail file */
const PATIENT_DETAIL = {
  "王建国": "doctor-patient-19_raw.html",
  "李秀英": "doctor-patient-20_raw.html",
  "赵志强": "doctor-patient-21_raw.html",
  "陈美玲": "doctor-patient-22_raw.html",
  "刘大伟": "doctor-patient-23_raw.html",
};

const DOCTOR_DRILL = [
  /* new item pages */
  { match: ["新建患者","添加新的患者"], page: "doctor-patients-new_raw.html" },
  { match: ["新建任务","添加随访"], page: "doctor-tasks-new_raw.html" },
  /* tasks → review/task detail (first match wins) */
  { match: ["王建国 问诊记录","王建国问诊"], page: "doctor-review-15_raw.html" },
  { match: ["李秀英 问诊记录","李秀英问诊"], page: "doctor-review-16_raw.html" },
  { match: ["问诊记录","待审核","AI诊断"], page: "doctor-review-15_raw.html" },
  { match: ["MRI增强复查"], page: "doctor-task-754_raw.html" },
  { match: ["INR监测"], page: "doctor-task-755_raw.html" },
  { match: ["腰椎MRI"], page: "doctor-task-756_raw.html" },
  { match: ["术后随访"], page: "doctor-task-757_raw.html" },
  { match: ["抗癫痫"], page: "doctor-task-758_raw.html" },
  /* settings sub-pages */
  { match: ["门诊病历报告模板","报告模板","标准格式"], page: "doctor-settings-template_raw.html" },
  { match: ["知识库","问诊指导","诊断规则","危险信号","治疗方案"], page: "doctor-knowledge-expanded_raw.html" },
  { match: ["新增知识","添加知识"], page: "doctor-knowledge-new_raw.html" },
  { match: ["关于","版本","系统信息"], page: "doctor-settings-about_raw.html" },
];

const PATIENT_DRILL = [
  { match: ["预问诊","开始问诊","新问诊"], page: "patient-interview_raw.html" },
  { match: ["问诊总结","门诊","病历详情","头痛","肢体无力","腰痛"], page: "patient-record-detail_raw.html" },
];

const BACK_MAP = {
  "doctor-patient-19_raw.html":         "doctor-patients_raw.html",
  "doctor-patient-20_raw.html":         "doctor-patients_raw.html",
  "doctor-patient-21_raw.html":         "doctor-patients_raw.html",
  "doctor-patient-22_raw.html":         "doctor-patients_raw.html",
  "doctor-patient-23_raw.html":         "doctor-patients_raw.html",
  "doctor-patients-new_raw.html":       "doctor-patients_raw.html",
  "doctor-task-754_raw.html":           "doctor-tasks_raw.html",
  "doctor-task-755_raw.html":           "doctor-tasks_raw.html",
  "doctor-task-756_raw.html":           "doctor-tasks_raw.html",
  "doctor-task-757_raw.html":           "doctor-tasks_raw.html",
  "doctor-task-758_raw.html":           "doctor-tasks_raw.html",
  "doctor-tasks-new_raw.html":          "doctor-tasks_raw.html",
  "doctor-review-15_raw.html":          "doctor-tasks_raw.html",
  "doctor-review-16_raw.html":          "doctor-tasks_raw.html",
  "doctor-review-17_raw.html":          "doctor-tasks_raw.html",
  "doctor-review-18_raw.html":          "doctor-tasks_raw.html",
  "doctor-settings-template_raw.html":  "doctor-settings_raw.html",
  "doctor-settings-knowledge_raw.html": "doctor-settings_raw.html",
  "doctor-knowledge-expanded_raw.html": "doctor-settings_raw.html",
  "doctor-knowledge-new_raw.html":      "doctor-knowledge-expanded_raw.html",
  "doctor-knowledge-detail_raw.html":   "doctor-knowledge-expanded_raw.html",
  "doctor-settings-about_raw.html":     "doctor-settings_raw.html",
  "patient-record-detail_raw.html":     "patient-records_raw.html",
  "patient-interview_raw.html":         "patient-home_raw.html",
};

let role = "doctor";
let currentFile = "doctor-home_raw.html";

function switchRole(r) {
  role = r;
  document.querySelectorAll(".role-switch button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  navigate(r === "doctor" ? "doctor-home_raw.html" : "patient-home_raw.html");
}

function navigate(file) {
  currentFile = file;
  document.getElementById("viewer").src = file;
  const nav = role === "doctor" ? DOCTOR_NAV : PATIENT_NAV;
  const label = Object.entries(nav).find(([,f]) => f === file)?.[0]
    || file.replace(/_raw\.html$/, "").replace(/-/g, " ");
  document.getElementById("caption").textContent = label;
}

function fixIframe() {
  try {
    const doc = document.getElementById("viewer").contentDocument;
    if (!doc) return;
    doc.querySelectorAll("*").forEach(el => {
      if (getComputedStyle(el).position === "fixed") {
        el.style.position = "absolute";
        el.style.width = "375px";
        el.style.left = "0";
        el.style.right = "auto";
      }
    });
    doc.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();

      /* Collect text at multiple levels for matching */
      const texts = [];
      let el = e.target;
      for (let i = 0; i < 8 && el && el !== doc.body; i++) {
        const t = (el.textContent || "").trim();
        if (t) texts.push(t);
        el = el.parentElement;
      }

      /* Find the shortest meaningful text (most specific click target) */
      const shortText = texts.find(t => t.length >= 1 && t.length < 30) || "";
      const medText = texts.find(t => t.length >= 2 && t.length < 100) || "";

      /* 1. Bottom nav — match short text exactly */
      const nav = role === "doctor" ? DOCTOR_NAV : PATIENT_NAV;
      for (const [label, file] of Object.entries(nav)) {
        if (shortText.includes(label)) { navigate(file); return; }
      }

      /* 2. Back button (SVG arrow) */
      const svgEl = e.target.closest ? e.target.closest("svg") : null;
      if (svgEl) {
        const pt = (svgEl.parentElement?.textContent || "").trim();
        if (pt.length < 20) {
          const back = BACK_MAP[currentFile];
          if (back) { navigate(back); return; }
        }
      }

      /* 3. Patient name → detail */
      if (role === "doctor") {
        for (const [name, file] of Object.entries(PATIENT_DETAIL)) {
          if (medText.includes(name)) { navigate(file); return; }
        }
      }

      /* 4. Drill-down rules — use medium text */
      const drills = role === "doctor" ? DOCTOR_DRILL : PATIENT_DRILL;
      for (const rule of drills) {
        if (rule.match.some(m => medText.includes(m))) {
          navigate(rule.page); return;
        }
      }
    }, true);
  } catch (err) {}
}

document.getElementById("viewer").addEventListener("load", fixIframe);
navigate("doctor-home_raw.html");
</script>
</body>
</html>
