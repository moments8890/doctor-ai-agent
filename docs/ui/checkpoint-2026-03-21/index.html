<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor AI Agent — UI Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', sans-serif;
    background: #f0f0f0;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 16px 0;
  }
  .role-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .role-btn {
    padding: 6px 20px; border-radius: 20px; border: 1px solid #ddd;
    background: #fff; color: #666; cursor: pointer; font-size: 13px;
  }
  .role-btn.active { background: #07C160; color: #fff; border-color: #07C160; }
  .phone {
    width: 375px; height: 812px;
    border: 2px solid #333; border-radius: 24px;
    overflow: hidden; background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    position: relative;
  }
  .phone iframe { width: 100%; height: 100%; border: none; display: block; }
  .breadcrumb { font-size: 12px; color: #999; margin-top: 8px; font-family: monospace; }
  .back-btn {
    position: absolute; top: 0; left: 0; width: 60px; height: 48px;
    z-index: 5; cursor: pointer; display: none;
  }
  .back-btn:hover { background: rgba(0,0,0,0.03); }
  .back-btn.visible { display: block; }
</style>
</head>
<body>

<div class="role-bar">
  <div class="role-btn active" onclick="switchRole('doctor')">Doctor</div>
  <div class="role-btn" onclick="switchRole('patient')">Patient</div>
</div>

<div class="phone">
  <iframe id="screen" src="doctor-home_raw.html"></iframe>
  <div class="back-btn" id="back-btn" onclick="goBack()"></div>
</div>

<div class="breadcrumb" id="breadcrumb">/doctor</div>

<script>
const DOCTOR_PAGES = {
  home:               { file: 'doctor-home_raw.html', route: '/doctor' },
  chat:               { file: 'doctor-chat_raw.html', route: '/doctor/chat', parent: 'home' },
  patients:           { file: 'doctor-patients_raw.html', route: '/doctor/patients' },
  'patient-detail':   { file: 'doctor-patient-detail_raw.html', route: '/doctor/patients/:id', parent: 'patients' },
  'patient-new':      { file: 'doctor-patient-new_raw.html', route: '/doctor/patients/new', parent: 'patients' },
  tasks:              { file: 'doctor-tasks_raw.html', route: '/doctor/tasks' },
  'task-detail':      { file: 'doctor-task-detail_raw.html', route: '/doctor/tasks/task/:id', parent: 'tasks' },
  'task-new':         { file: 'doctor-task-new_raw.html', route: '/doctor/tasks/new', parent: 'tasks' },
  'review-diagnosis': { file: 'doctor-review-diagnosis_raw.html', route: '/doctor/tasks/review/:id', parent: 'tasks' },
  settings:           { file: 'doctor-settings_raw.html', route: '/doctor/settings' },
  template:           { file: 'doctor-settings-template_raw.html', route: '/doctor/settings/template', parent: 'settings' },
  knowledge:          { file: 'doctor-settings-knowledge_raw.html', route: '/doctor/settings/knowledge', parent: 'settings' },
  'knowledge-add':    { file: 'doctor-knowledge-add_raw.html', route: '/doctor/settings/knowledge/add', parent: 'knowledge' },
  about:              { file: 'doctor-settings-about_raw.html', route: '/doctor/settings/about', parent: 'settings' },
};

const PATIENT_PAGES = {
  home:     { file: 'patient-home_raw.html', route: '/patient/chat' },
  records:  { file: 'patient-records_raw.html', route: '/patient/records' },
  tasks:    { file: 'patient-tasks_raw.html', route: '/patient/tasks' },
  settings: { file: 'patient-settings_raw.html', route: '/patient/profile' },
};

// Text → navigation target. Checked against innerText of clicked elements.
// More specific patterns first. Works for both exact and partial matches.
const DOCTOR_CLICK_RULES = [
  // Bottom nav
  { text: '首页', target: 'home', context: 'nav' },
  { text: '患者', target: 'patients', context: 'nav' },
  { text: '任务', target: 'tasks', context: 'nav' },
  { text: '设置', target: 'settings', context: 'nav' },
  // Home page
  { text: '问 AI', target: 'chat' },
  { text: '审核', target: 'review-diagnosis' },
  // Patient list
  { text: '新建患者', target: 'patient-new', page: 'patients' },
  { text: '添加新的患者档案', target: 'patient-new', page: 'patients' },
  { text: '张三', target: 'patient-detail', page: 'patients' },
  { text: '李四', target: 'patient-detail', page: 'patients' },
  { text: '王五', target: 'patient-detail', page: 'patients' },
  { text: 'test_patient', target: 'patient-detail', page: 'patients' },
  // Task list
  { text: '新建任务', target: 'task-new', page: 'tasks' },
  { text: '问诊记录', target: 'review-diagnosis', page: 'tasks' },
  { text: '待审核', target: 'review-diagnosis', page: 'tasks' },
  { text: '随访', target: 'task-detail', page: 'tasks' },
  { text: 'MRI', target: 'task-detail', page: 'tasks' },
  { text: '血糖', target: 'task-detail', page: 'tasks' },
  // Settings → subpages
  { text: '报告模板', target: 'template', page: 'settings' },
  { text: '知识库', target: 'knowledge', page: 'settings' },
  { text: '关于', target: 'about', page: 'settings' },
  // Knowledge → add
  { text: '添加', target: 'knowledge-add', page: 'knowledge' },
];

const PATIENT_CLICK_RULES = [
  // Bottom nav
  { text: '主页', target: 'home', context: 'nav' },
  { text: '病历', target: 'records', context: 'nav' },
  { text: '任务', target: 'tasks', context: 'nav' },
  { text: '设置', target: 'settings', context: 'nav' },
];

let currentRole = 'doctor';
let currentPage = 'home';

function getPages() { return currentRole === 'doctor' ? DOCTOR_PAGES : PATIENT_PAGES; }
function getRules() { return currentRole === 'doctor' ? DOCTOR_CLICK_RULES : PATIENT_CLICK_RULES; }

function navigate(pageKey) {
  const pages = getPages();
  if (!pages[pageKey]) return;
  currentPage = pageKey;
  const page = pages[pageKey];
  document.getElementById('screen').src = page.file;
  document.getElementById('breadcrumb').textContent = page.route;
  document.getElementById('back-btn').className = page.parent ? 'back-btn visible' : 'back-btn';

  document.getElementById('screen').onload = () => injectClickHandlers();
}

function goBack() {
  const page = getPages()[currentPage];
  if (page?.parent) navigate(page.parent);
}

function injectClickHandlers() {
  const iframe = document.getElementById('screen');
  let doc;
  try { doc = iframe.contentDocument || iframe.contentWindow.document; } catch { return; }

  const rules = getRules();

  // Capture all clicks in the iframe
  doc.addEventListener('click', (e) => {
    // Walk up from click target to find a matching rule
    let el = e.target;
    for (let i = 0; i < 10 && el && el !== doc.body; i++) {
      const text = (el.innerText || el.textContent || '').trim();

      for (const rule of rules) {
        // Skip page-specific rules if not on that page
        if (rule.page && rule.page !== currentPage) continue;

        // For nav buttons, check if this is inside a bottom nav
        if (rule.context === 'nav') {
          const isNav = el.closest('.MuiBottomNavigation-root') ||
                        el.closest('[class*="BottomNavigation"]') ||
                        el.closest('button[class*="BottomNavigationAction"]');
          if (!isNav) continue;
        }

        if (text.includes(rule.text)) {
          e.preventDefault();
          e.stopPropagation();
          navigate(rule.target);
          return;
        }
      }
      el = el.parentElement;
    }
  }, true);

  // Also handle back button (ChevronLeft SVG click)
  doc.addEventListener('click', (e) => {
    let el = e.target;
    for (let i = 0; i < 5 && el; i++) {
      if (el.tagName === 'svg' || el.querySelector?.('svg[data-testid*="Chevron"]')) {
        const page = getPages()[currentPage];
        if (page?.parent) {
          e.preventDefault();
          e.stopPropagation();
          goBack();
          return;
        }
      }
      el = el.parentElement;
    }
  }, true);
}

function switchRole(role) {
  currentRole = role;
  currentPage = 'home';
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  navigate('home');
}

navigate('home');
</script>
</body>
</html>
