<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" href="data:,">
    <style>html, body { overscroll-behavior: none; } *, *::before, *::after { box-sizing: border-box; }</style>
    <title>鲸鱼随行</title>
    <script>
      // Inline title prefix — runs before the React bundle so even the brief
      // pre-hydration tab title shows the env. Mirrors src/lib/pageTitle.js;
      // keep the two in sync. Order matters: ".stg." check before ".doctoragentai.cn".
      (function() {
        var host = window.location.hostname;
        var port = window.location.port;
        var env = "";
        var STG_SUFFIX = ".stg.doctoragentai.cn";
        var PROD_SUFFIX = ".doctoragentai.cn";
        if (host === "localhost" || host === "127.0.0.1" || port === "5173" || port === "5174") env = "dev";
        else if (host.length >= STG_SUFFIX.length && host.lastIndexOf(STG_SUFFIX) === host.length - STG_SUFFIX.length) env = "stg";
        else if (host.length >= PROD_SUFFIX.length && host.lastIndexOf(PROD_SUFFIX) === host.length - PROD_SUFFIX.length) env = "内测版";
        if (env) document.title = "[" + env + "] " + document.title;
      })();
    </script>
    <!-- WeChat JS-SDK pinned via Subresource Integrity. If Tencent's CDN
         ever serves modified content for this URL, the browser refuses
         to execute it and the WeChat features fail loud rather than
         silently exfiltrate. Re-compute the hash if WeChat publishes a
         legitimate update:
           curl https://res.wx.qq.com/open/js/jweixin-1.6.0.js \
             | openssl dgst -sha384 -binary | openssl base64 -A -->
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"
            integrity="sha384-bhnoAf0QbZ3a4P9JqPJNMlBxDP0bxxqnuRLFdwyTOUOUqCcvFKk6Jv4M+x9r+P+d"
            crossorigin="anonymous"></script>
    <!-- ?v= cache-buster: nginx serves /fonts/*.css with `Cache-Control: public,
         immutable, max-age=30d`, so browsers that cached the pre-rlig copy will
         keep using it for a month unless the URL changes. Bump this string
         whenever this file's content changes. -->
    <link rel="stylesheet" href="/fonts/material-symbols-outlined.css?v=2026-04-25-rlig" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
