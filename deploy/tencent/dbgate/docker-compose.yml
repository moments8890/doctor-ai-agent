# DBGate — browser-based DB admin UI (MySQL schema, ER diagrams, data browser).
#
# Deploy runbook: ../dbgate.md
# Secrets: `dbgate.secrets` sibling file (gitignored), populated from the runbook.
#
# Service binds only to 127.0.0.1 — external access via SSH tunnel or
# nginx proxy under a protected path (see runbook).
#
# Network shape: DBGate reaches the MySQL container via a user-defined
# bridge network (`dbgate_net`) that both containers are attached to.
# This is cleaner than host.docker.internal because:
#   - MySQL in doctor-ai-mysql exposes port 3306 only on 127.0.0.1 of
#     the host (via docker-proxy) — unreachable from other containers'
#     bridge gateway (172.17.0.1).
#   - User-defined networks give container-name DNS resolution, so we
#     reach it cleanly at `doctor-ai-mysql:3306`.
#   - `docker network connect` attaches doctor-ai-mysql to dbgate_net
#     without restarting it — zero downtime for the backend.
#
# See runbook for the one-time `docker network create dbgate_net` +
# `docker network connect dbgate_net doctor-ai-mysql` setup.
#
# Image prefix chosen for Tencent CVM (mainland China) — docker.io is
# GFW-unreliable here. Third-party images via docker.1ms.run (same
# namespaces as docker.io).

services:
  dbgate:
    image: docker.1ms.run/dbgate/dbgate:latest
    restart: unless-stopped
    ports:
      # Bound to localhost only — see runbook for SSH-tunnel / nginx access.
      - "127.0.0.1:8101:3000"
    environment:
      # DBGate's own login wall. No external auth proxy — this is the
      # gate. Keep the password strong; it protects full DB read/write.
      LOGIN: ${DBGATE_LOGIN}
      PASSWORD: ${DBGATE_PASSWORD}

      # Subpath hosting. DBGate honours WEB_ROOT when serving under a
      # reverse-proxy prefix. Leave unset for SSH-tunnel-only access.
      WEB_ROOT: ${DBGATE_WEB_ROOT:-}

      # Preset doctor-ai MySQL connection. Credentials land in
      # `docker inspect` output — use a scoped MySQL user (dbgate_reader
      # with SELECT/SHOW VIEW/REFERENCES on doctor_ai.*; runbook).
      #
      # SERVER_doctorai resolves via dbgate_net DNS to the container.
      CONNECTIONS: doctorai
      LABEL_doctorai: doctor-ai (prod)
      SERVER_doctorai: doctor-ai-mysql
      PORT_doctorai: "3306"
      USER_doctorai: ${DBGATE_MYSQL_USER}
      PASSWORD_doctorai: ${DBGATE_MYSQL_PASSWORD}
      ENGINE_doctorai: mysql@dbgate-plugin-mysql
      DATABASE_doctorai: ${DBGATE_MYSQL_DB:-doctor_ai}
      # Read-only by default. The real gate is the MySQL GRANT — this
      # flag is UI affordance only.
      READ_ONLY_doctorai: ${DBGATE_READ_ONLY:-true}

    networks:
      - dbgate_net

    volumes:
      # Persists saved queries, chart definitions, UI preferences.
      - dbgate_data:/root/.dbgate

networks:
  dbgate_net:
    external: true

volumes:
  dbgate_data:
