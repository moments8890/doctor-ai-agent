<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>doctor-ai 系统告警</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f7;font-family:-apple-system,'PingFang SC','Helvetica Neue',Arial,sans-serif;color:#1d1d1f;">
  <div style="max-width:560px;margin:32px auto;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e5ea;">

    <div style="padding:20px 24px;background:#1d1d1f;color:#ffffff;">
      <div style="font-size:13px;opacity:0.7;letter-spacing:0.04em;">DOCTOR-AI · 系统告警</div>
      <div style="font-size:20px;font-weight:600;margin-top:4px;">{{alert_title}}</div>
    </div>

    <div style="padding:24px;">
      <div style="font-size:15px;line-height:1.6;color:#1d1d1f;">
        {{alert_summary}}
      </div>

      <div style="margin-top:20px;padding:16px;background:#f5f5f7;border-radius:8px;font-family:'SF Mono','Monaco','Menlo',monospace;font-size:13px;color:#3a3a3c;white-space:pre-wrap;word-break:break-all;">{{alert_detail}}</div>

      <div style="margin-top:24px;font-size:13px;color:#86868b;">
        <div><strong style="color:#1d1d1f;">触发时间</strong>：{{alert_time}}</div>
        <div style="margin-top:4px;"><strong style="color:#1d1d1f;">来源主机</strong>：{{alert_host}}</div>
      </div>

      <div style="margin-top:24px;padding:16px;background:#fff8e6;border-left:3px solid #f5a623;border-radius:4px;font-size:14px;line-height:1.5;color:#1d1d1f;">
        <strong>建议操作</strong>：{{alert_action}}
      </div>
    </div>

    <div style="padding:16px 24px;background:#fafafa;border-top:1px solid #e5e5ea;font-size:12px;color:#86868b;text-align:center;">
      此邮件由 doctor-ai 内部基础设施监控系统发送，仅面向 doctoragentai.cn 工程团队成员。
    </div>

  </div>
</body>
</html>
