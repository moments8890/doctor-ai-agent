# app.doctoragentai.cn — the doctor + patient SPA.
#
# Pure static; the SPA fetches the API from https://api.doctoragentai.cn
# (wired via VITE_API_BASE_URL at build time). No /api/ proxy here on
# purpose — the API stays single-source-of-truth at api.*, which keeps
# CORS explicit and the auth boundary visible.

server {
    listen 80;
    listen [::]:80;
    server_name app.doctoragentai.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20m;

    root /home/ubuntu/doctor-ai-agent/frontend/dist;
    index index.html;

    # Long-cache hashed assets (Vite emits content-hashed filenames).
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
