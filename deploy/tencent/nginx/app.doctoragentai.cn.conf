# app.doctoragentai.cn — the doctor + patient SPA.
#
# Pure static; the SPA fetches the API from https://api.doctoragentai.cn
# (wired via VITE_API_BASE_URL at build time). No /api/ proxy here on
# purpose — the API stays single-source-of-truth at api.*, which keeps
# CORS explicit and the auth boundary visible.

server {
    listen 80;
    listen [::]:80;
    server_name app.doctoragentai.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    server_tokens off;

    # Static-response security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), camera=(self), microphone=(self), interest-cohort=()" always;

    # Content-Security-Policy in REPORT-ONLY mode for now. Promote to
    # enforce mode (Content-Security-Policy) after a soak period with no
    # legitimate-traffic violation reports.
    #
    # Allowances explained:
    #   script-src includes res.wx.qq.com for the WeChat JS-SDK and
    #   'unsafe-inline' for the env-detection inline script in
    #   index.html. Refactor that script out to drop 'unsafe-inline'
    #   and tighten further.
    #   connect-src api.doctoragentai.cn for SPA→API XHR/fetch.
    #   img-src https: covers OCR previews, patient avatars, etc.
    #   style-src 'unsafe-inline' covers MUI/React inline styles.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' https://res.wx.qq.com 'unsafe-inline'; connect-src 'self' https://api.doctoragentai.cn; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    client_max_body_size 20m;

    root /home/ubuntu/doctor-ai-agent/frontend/dist;
    index index.html;

    # Long-cache hashed assets (Vite emits content-hashed filenames).
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
