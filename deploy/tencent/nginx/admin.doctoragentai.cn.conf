# admin.doctoragentai.cn — operations console.
#
# Single gate: app-layer X-Admin-Token via FastAPI's `require_admin_role`.
# `/api/admin/*` endpoints reject without a valid token. The SPA's
# /admin/login form collects the token, stores it in localStorage, and
# sends it as `X-Admin-Token: <token>` on every admin API call.
#
# Why no nginx auth_basic: avoids credential-sharing with ops.* (each
# realm has its own purpose), removes the two-step login friction, and
# pushes the entire auth boundary to the app layer where role
# distinction (super vs doctor) lives anyway. Trade-off: any future
# FastAPI route-mounting bug like `d0bdeccc` becomes externally visible
# on this host until caught — accept that risk + cover with tests.
#
# Why no IP allowlist: the partner doctor at the hospital may be on a
# dynamic IP. Locking by IP would create support burden without
# meaningful security gain over the token gate.
#
# Mounts:
#   /                  → SPA bundle from frontend/dist (same as app.*),
#                        the admin route mounts at /admin/login + /admin/*.
#   /api/*             → FastAPI :8000 (includes /api/admin/* via prefix).
#   /healthz           → nginx-direct.
#   /.well-known/...   → certbot challenge.

server {
    listen 80;
    listen [::]:80;
    server_name admin.doctoragentai.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Tighter security headers — admin is a privileged surface.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    # ── Standard paths ─────────────────────────────────────────────
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── Backend API — FastAPI's require_admin_role is the only gate ─
    # /api/admin/* requires X-Admin-Token (super or doctor role).
    # /api/* paths NOT under /admin/ inherit their own auth (JWT for
    # patient/doctor endpoints), but reaching them through admin.*
    # serves no purpose for the admin SPA — the SPA only calls
    # /api/admin/* and /api/auth/* (token validation).
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # ── SPA bundle (same dist as app.*) ────────────────────────────
    # admin v3 mounts at /admin/login and /admin/*; the SPA shell is
    # the same React build. Reading from disk via try_files is cheaper
    # than proxying to app.* and avoids a second TLS hop.
    root /home/ubuntu/doctor-ai-agent/frontend/dist;
    index index.html;

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
