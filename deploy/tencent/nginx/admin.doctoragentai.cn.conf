# admin.doctoragentai.cn — operations console.
#
# Two gates (defense in depth):
#   1. nginx auth_basic at the vhost level — htpasswd shared with ops.*
#      so a single set of creds covers every internal surface.
#   2. App-layer X-Admin-Token via FastAPI's `require_admin_role`
#      (`/api/admin/*` endpoints reject without a valid token even if
#      basic-auth passes).
#
# IP allowlist intentionally NOT applied — the partner doctor logging
# in from a hospital network may not have a static IP, and locking
# them out would create more support burden than the marginal security
# gain. If a static endpoint becomes available later, add `allow X.Y.Z.0/24;
# deny all; satisfy all;` at the vhost level to upgrade to 3 gates.
#
# Mounts:
#   /                  → SPA bundle from frontend/dist (same as app.*),
#                        the admin route mounts at /admin/login + /admin/*.
#   /api/*             → FastAPI :8000 (includes /api/admin/* via prefix).
#   /healthz           → nginx-direct, NOT gated (deploy probes need this).
#   /.well-known/...   → certbot challenge, NOT gated.

server {
    listen 80;
    listen [::]:80;
    server_name admin.doctoragentai.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Tighter security headers — admin is a privileged surface.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    # Vhost-level basic-auth — applies to every location below unless
    # explicitly overridden with `auth_basic off;`.
    auth_basic "admin";
    auth_basic_user_file /etc/nginx/htpasswd;

    # ── Un-gated paths (deploy probes + cert renewal) ──────────────
    location = /healthz {
        auth_basic off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
    location /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── Backend API (basic-auth gates the connection; FastAPI's
    #    require_admin_role gates the actual /api/admin/* endpoints) ─
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # ── SPA bundle (same dist as app.*) ────────────────────────────
    # admin v3 mounts at /admin/login and /admin/*; the SPA shell is
    # the same React build. Reading from disk via try_files is cheaper
    # than proxying to app.* and avoids a second TLS hop.
    root /home/ubuntu/doctor-ai-agent/frontend/dist;
    index index.html;

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
