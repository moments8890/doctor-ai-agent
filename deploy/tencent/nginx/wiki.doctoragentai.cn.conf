# wiki.doctoragentai.cn — public docs.
#
# Serves the static HTML in frontend/dist/wiki/. The default index is
# wiki.html (the existing entrypoint with sidebar + iframe content
# pane); /-on-empty-path falls back to it.
#
# NOTE: the wiki currently mixes 公开 + 内部 content (设计文档,
# Redesign 截图). Until that's split out, anyone with the URL can read
# internal docs. Don't promote wiki.* to public marketing until the
# 内部 sidebar group is moved off (out of scope for this round per
# user instruction — they'll do it after the infra split is stable).

server {
    listen 80;
    listen [::]:80;
    server_name wiki.doctoragentai.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wiki.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;  # iframe-based wiki nav
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /home/ubuntu/doctor-ai-agent/frontend/dist/wiki;
    index wiki.html;

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /wiki.html;
    }
}
