# wiki.doctoragentai.cn — public-facing user docs only.
#
# Serves the static HTML in frontend/dist/wiki/. The default index is
# wiki.html (sidebar of user-facing groups: 导航 / 使用指南 / 患者体验 /
# 了解更多).
#
# Internal docs (architecture, deploy runbooks, ops setup) live on
# docs.doctoragentai.cn behind basic-auth. The same dist/wiki/
# directory holds the source files for both, so wiki.* explicitly
# 404s the internal paths to prevent direct-URL leaks. Adding a new
# internal doc means: drop the .md, list it in wiki-internal.html DOCS
# map, link from docs.html sidebar — wiki.* doesn't need any change.

server {
    listen 80;
    listen [::]:80;
    server_name wiki.doctoragentai.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wiki.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;  # iframe-based wiki nav
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /home/ubuntu/doctor-ai-agent/frontend/dist/wiki;
    index wiki.html;

    # Defense in depth: explicitly 404 the internal-docs surfaces so
    # wiki.* (public, no auth) can NEVER serve them, even though the
    # files live in the shared dist/wiki/ directory.
    location = /docs.html              { return 404; }
    location = /wiki-internal.html     { return 404; }
    location /internal-docs/           { return 404; }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /wiki.html;
    }
}
