# docs.doctoragentai.cn — internal architecture + deploy docs.
#
# Single gate: basic-auth at the vhost level. The htpasswd file is
# DEDICATED to docs.* (NOT shared with ops.* — different audience,
# different rotation cadence). Generate the entry with:
#     sudo htpasswd -c /etc/nginx/.docs-htpasswd dev
#
# Why no IP allowlist: this is dev-facing read-only content — no
# secrets, no destructive operations. Auth-only matches similar
# read-only docs sites (Confluence, Notion private spaces).
#
# What's served:
#   /                   → docs.html (sidebar of internal docs)
#   /wiki-internal.html → marked.js renderer (already exists)
#   /internal-docs/*.md → source MDs synced from repo by deploy.sh
#   /healthz            → nginx-direct, NOT gated
#
# Public-facing wiki.* explicitly 404s these same paths so the
# content is reachable ONLY through docs.* despite both vhosts
# pointing at the same dist directory.

server {
    listen 80;
    listen [::]:80;
    server_name docs.doctoragentai.cn;
    location /.well-known/acme-challenge/ { root /var/www/certbot; try_files $uri =404; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;  # iframe nav inside docs.html
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 5m;

    # Vhost-level basic-auth — applies to every location below unless
    # explicitly overridden with `auth_basic off;`.
    auth_basic "docs";
    auth_basic_user_file /etc/nginx/.docs-htpasswd;

    location = /healthz {
        auth_basic off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
    location /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/certbot;
        try_files $uri =404;
    }

    root /home/ubuntu/doctor-ai-agent/frontend/dist/wiki;
    index docs.html;

    # Explicit allow-list of paths docs.* serves. Anything else 404s
    # so this host can't accidentally leak the public wiki pages.
    location = /                       { try_files /docs.html =404; }
    location = /docs.html              { try_files $uri =404; }
    location = /wiki-internal.html     { try_files $uri =404; }
    location /internal-docs/           { try_files $uri =404; }
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # Catch-all: 404 (don't fall through to the public wiki pages
    # that share this dist directory).
    location / { return 404; }
}
