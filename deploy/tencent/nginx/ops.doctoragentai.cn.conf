# ops.doctoragentai.cn — internal-only tools, double-gated.
#
# Two gates:
#   1. nginx auth_basic (htpasswd at /etc/nginx/htpasswd)
#   2. IP allowlist (allow / deny)
#
# Both must pass — `satisfy all` is the default. If you need access
# from a new location, add the IP to the allow list. If you need to
# rotate creds, regenerate htpasswd and reload nginx.
#
# Tools mounted:
#   /            → 301 → /glitchtip/   (default landing)
#   /glitchtip/  → http://127.0.0.1:8100  (Sentry-compatible error tracking)
#   /dbgate/     → http://127.0.0.1:8101  (DB UI, was misnamed "adminer")
#   /n8n/        → http://127.0.0.1:5678  (workflow automation, supports websocket)

server {
    listen 80;
    listen [::]:80;
    server_name ops.doctoragentai.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ops.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Tighter security headers — these tools are privileged.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50m;  # n8n workflow imports + dbgate exports

    # Vhost-level gates — apply to every location below.
    auth_basic "ops";
    auth_basic_user_file /etc/nginx/htpasswd;
    allow YOUR.HOME.IP;
    allow YOUR.OFFICE.IP;
    deny all;
    satisfy all;

    location = / {
        return 301 /glitchtip/;
    }

    location /glitchtip/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8100/;
    }

    location /dbgate/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_pass http://127.0.0.1:8101/;
    }

    location /n8n/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_pass http://127.0.0.1:5678/;
    }
}
