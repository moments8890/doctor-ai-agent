# api.doctoragentai.cn — JSON API + a few backend-proxied side-paths.
#
# After Phase 5 cutover, this host serves the FastAPI app and nothing
# else: no SPA bundle, no /wiki, no /glitchtip — those move to their
# own vhosts. The bare-domain and stray browser paths 301 → app.* so
# bookmarks don't die on the day of cutover.
#
# CORS is enforced upstream by FastAPI's CORSMiddleware (configured via
# CORS_ALLOW_ORIGINS in runtime.json); nginx leaves Access-Control-*
# untouched so FastAPI is the single source of truth.

# :80 → :443.
server {
    listen 80;
    listen [::]:80;
    server_name api.doctoragentai.cn;

    # Keep certbot HTTP-01 working on :80 even after :443 takes over.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers safe on a pure-API host. (No HSTS — leave that to
    # app.* / ops.* until the org-wide preload posture is decided.)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20m;

    # ── nginx-served paths (no upstream) ────────────────────────────
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── Removed surfaces: api.* no longer serves admin / wiki / db /
    #    logs paths and does not advertise where they live. Anyone
    #    hitting these gets a flat 404 — the same response a random
    #    scanner would see — rather than a 301 leaking the new host.
    #    Authorized clients should use admin.* / wiki.* / ops.* directly.
    location ~ ^/api/admin/    { return 404; }
    location /admin            { return 404; }   # catches /admin, /admin/, /admin/login, ...
    location /wiki             { return 404; }
    location /dbgate           { return 404; }
    location /glitchtip        { return 404; }   # logs / error tracking moved to ops.*

    # ── Backend (FastAPI on :8000) — REST + integration endpoints ───
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # Signed download URLs (PDF exports etc.).
    location /download/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
    }

    # WeChat callback — token verification + miniprogram messages.
    location /wechat {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # WebSocket upgrade — live updates push channel.
    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # Internal smoke endpoints (UI_DEBUG_TOKEN gated at the app layer).
    location /test/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
    }

    # Gitee webhook receiver — runs deploy.sh on push events.
    location = /hooks/deploy {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:9000;
    }

    # WeChat 业务域名 verify file — must come BEFORE the catch-all 301 so
    # WeChat's verifier gets the file directly instead of a redirect to app.*
    # (some verifiers don't follow redirects). Source file lives in repo at
    # frontend/web/public/ which Vite copies into dist on build. Broad regex
    # matches any short .txt at root so future verify filenames work without
    # touching this config (WeChat re-issues the filename on every batch
    # domain change).
    location ~ "^/([A-Za-z0-9_-]+\.txt)$" {
        alias /home/ubuntu/doctor-ai-agent/frontend/web/public/$1;
        try_files "" =404;
        default_type text/plain;
    }

    # ── Catch-all: SPA paths (login, doctor, patient) 301 to app.* ─
    # /admin, /wiki, /dbgate, /glitchtip are explicitly 404'd above
    # so they don't leak to app.* (which doesn't host them either).
    # /, /login, /doctor/*, /patient/* still 301 here for graceful
    # bookmark migration.
    location / {
        return 301 https://app.doctoragentai.cn$request_uri;
    }
}
