# api.doctoragentai.cn — strictly the JSON API.
#
# After the subdomain split, this host serves NOTHING but /api/* and
# /healthz. No SPA fallback, no /wiki, no /glitchtip — those move to
# their own vhosts. CORS is enforced upstream by FastAPI's
# CORSMiddleware (configured via CORS_ALLOW_ORIGINS env var); we leave
# Access-Control-* untouched at nginx so the response from FastAPI is
# the authoritative source.

# 80 → 443 redirect (wildcard cert covers all subdomains).
server {
    listen 80;
    listen [::]:80;
    server_name api.doctoragentai.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers that are safe on a pure-API host.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20m;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # 301 redirects for legacy paths (drop after one release cycle).
    location /wiki/      { return 301 https://wiki.doctoragentai.cn$request_uri; }
    location /glitchtip/ { return 301 https://ops.doctoragentai.cn$request_uri; }
    location /dbgate/    { return 301 https://ops.doctoragentai.cn$request_uri; }

    # Anything else on api.* is not API — refuse loudly.
    location / {
        return 404;
    }
}
