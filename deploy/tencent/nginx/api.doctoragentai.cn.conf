# api.doctoragentai.cn — JSON API + a few backend-proxied side-paths.
#
# After Phase 5 cutover, this host serves the FastAPI app and nothing
# else: no SPA bundle, no /wiki, no /glitchtip — those move to their
# own vhosts. The bare-domain and stray browser paths 301 → app.* so
# bookmarks don't die on the day of cutover.
#
# CORS is enforced upstream by FastAPI's CORSMiddleware (configured via
# CORS_ALLOW_ORIGINS in runtime.json); nginx leaves Access-Control-*
# untouched so FastAPI is the single source of truth.

# :80 → :443.
server {
    listen 80;
    listen [::]:80;
    server_name api.doctoragentai.cn;

    # Keep certbot HTTP-01 working on :80 even after :443 takes over.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.doctoragentai.cn;

    ssl_certificate     /etc/nginx/certs/wildcard.doctoragentai.cn.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.doctoragentai.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers safe on a pure-API host. (No HSTS — leave that to
    # app.* / ops.* until the org-wide preload posture is decided.)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20m;

    # ── nginx-served paths (no upstream) ────────────────────────────
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── Backend (FastAPI on :8000) — REST + integration endpoints ───
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # Signed download URLs (PDF exports etc.).
    location /download/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
    }

    # WeChat callback — token verification + miniprogram messages.
    location /wechat {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # WebSocket upgrade — live updates push channel.
    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }

    # Internal smoke endpoints (UI_DEBUG_TOKEN gated at the app layer).
    location /test/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
    }

    # Gitee webhook receiver — runs deploy.sh on push events.
    location = /hooks/deploy {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:9000;
    }

    # ── Legacy 301 redirects (drop after one release cycle) ────────
    # Bookmarks pointing at api.*/wiki etc. survive the cutover.
    location /wiki/      { return 301 https://wiki.doctoragentai.cn$request_uri; }
    location /glitchtip/ { return 301 https://ops.doctoragentai.cn$request_uri; }
    location /dbgate/    { return 301 https://ops.doctoragentai.cn$request_uri; }

    # ── Catch-all: anything else is the SPA — redirect to app.* ────
    # This includes /, /login, /doctor/*, /patient/*, /admin/* — old
    # bookmarks land on the new SPA host instead of getting 404'd.
    location / {
        return 301 https://app.doctoragentai.cn$request_uri;
    }
}
