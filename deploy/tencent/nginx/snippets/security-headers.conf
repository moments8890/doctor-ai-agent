# Security headers applied to every response from the including server block.
#
# Tuning notes:
#   - HSTS: 1 year, includeSubDomains. NO `preload` yet — preload is hard
#     to reverse, leave for once everything has been HTTPS-clean for months.
#   - Permissions-Policy: app uses camera (photo upload) and microphone
#     (voice ASR), so `camera=(self)` and `microphone=(self)`; deny others.
#   - X-Frame-Options SAMEORIGIN: prevent click-jacking. Switch to a CSP
#     `frame-ancestors` directive once we ship a CSP.
#
# Inheritance gotcha: nginx's `add_header` is NOT inherited into nested
# locations that have their own `add_header`. Re-include this file in any
# such location (e.g. `location = /index.html` which sets Cache-Control).
#
# Installed at /etc/nginx/snippets/security-headers.conf and included from
# the api.doctoragentai.cn server block.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(self), microphone=(self), interest-cohort=()" always;
