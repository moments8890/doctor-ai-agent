# phase0-lockdown.conf — interim guard for /glitchtip/, /dbgate/
# while the subdomain split (Phase 1+) is rolled out. Drop these into the
# existing api.doctoragentai.cn 443 server block, BEFORE the catch-all
# `location /` and the /api/ block. Reload nginx after editing.
#
# Effect: any request to internal-tool paths must satisfy basic-auth AND
# be in the IP allowlist. Until the wildcard-cert vhosts land, this is
# the only thing standing between the public internet and a DB UI.
#
# Setup once, before reloading nginx:
#   sudo htpasswd -c /etc/nginx/htpasswd opsuser   # prompts for password
#   # Substitute YOUR.HOME.IP and YOUR.OFFICE.IP below before reloading.
#
# The `auth_basic` realm tag ("ops") is shared so a single login covers
# all three locations within a session.

location /glitchtip/ {
    auth_basic "ops";
    auth_basic_user_file /etc/nginx/htpasswd;
    allow YOUR.HOME.IP;
    allow YOUR.OFFICE.IP;
    deny all;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:8100/;
}

location /dbgate/ {
    auth_basic "ops";
    auth_basic_user_file /etc/nginx/htpasswd;
    allow YOUR.HOME.IP;
    allow YOUR.OFFICE.IP;
    deny all;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_pass http://127.0.0.1:8101/;
}

