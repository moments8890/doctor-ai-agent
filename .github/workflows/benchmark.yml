# Hero-Loop MVP Benchmark Gate
#
# This workflow runs the full hero-loop quality gate, which includes:
#   1. MVP accuracy benchmark (29 P0 hero cases with DB assertions)
#   2. Integration test suite
#   3. Baseline regression comparison
#
# REQUIREMENTS — this job needs a self-hosted runner because it requires:
#   - LAN access to the Ollama inference server at 192.168.0.123:11434
#   - Python 3.13+ with venv
#   - ffmpeg (for voice tests, if any)
#
# The benchmark server is started on port 8001 during the run.

name: Benchmark Gate

on:
  workflow_dispatch:
    inputs:
      baseline_name:
        description: "Save result as named baseline (leave empty to skip)"
        required: false
        default: ""

# Prevent parallel benchmark runs — only one at a time
concurrency:
  group: hero-loop-benchmark
  cancel-in-progress: false

jobs:
  # ── Job 1: Unit tests (fast sanity check before expensive benchmark) ──
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: bash scripts/test.sh unit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            reports/coverage/coverage.xml
            reports/coverage/html/
            reports/junit/unit.xml
          retention-days: 30

  # ── Job 2: Hero-loop benchmark (manual trigger, self-hosted runner) ──
  #
  # This job requires a self-hosted runner with:
  #   - Label: self-hosted
  #   - LAN access to Ollama at 192.168.0.123:11434
  #   - Python 3.13+ available
  #   - Sufficient disk for SQLite DB created during benchmark
  #
  # The job starts the FastAPI server on port 8001, runs the hero-loop
  # benchmark against it, then optionally saves the result as a named baseline.
  hero-loop-benchmark:
    needs: unit-tests
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      HERO_BASE_URL: "http://127.0.0.1:8001"
      OLLAMA_BASE_URL: "http://192.168.0.123:11434"
      OLLAMA_VISION_BASE_URL: "http://192.168.0.123:11434"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start benchmark server
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8001 &
          echo "Waiting for server to become ready..."
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8001/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Server failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Run hero-loop benchmark
        run: bash scripts/test.sh hero-loop

      - name: Save baseline (if name provided)
        if: ${{ inputs.baseline_name != '' }}
        run: bash scripts/save_baseline.sh "${{ inputs.baseline_name }}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hero-loop-results
          path: |
            reports/candidate/hero.json
            reports/baseline/
            reports/junit/integration.xml
          retention-days: 90

      - name: Stop benchmark server
        if: always()
        run: |
          pkill -f "uvicorn main:app.*8001" || true
