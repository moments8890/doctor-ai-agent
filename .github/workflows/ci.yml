name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────
  # Fast (~1 min). No LLM or network required — all I/O is mocked.
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Run unit tests with coverage reports
        run: bash tools/test.sh unit

      - name: Enforce changed-lines coverage > 80%
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin main
          diff-cover reports/coverage/coverage.xml \
            --compare-branch=origin/main \
            --diff-range-notation=.. \
            --fail-under=81

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            reports/junit/unit.xml
            reports/coverage/coverage.xml
            reports/coverage/html

  # ── Integration tests ─────────────────────────────────────────────────────
  # Runs Ollama (qwen2.5:7b) in Docker alongside the live FastAPI app.
  # The model (~4.4 GB) is cached in GitHub Actions between runs so the
  # pull step is a no-op after the first run (~2 min total warm start).
  #
  # Skipped: test_image_pipeline.py — requires qwen2.5vl:7b (~8 GB extra).
  integration:
    name: Integration Tests (Ollama / qwen2.5:7b)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Configure repo variable INTEGRATION_RUNNER_LABEL to a larger runner label,
    # e.g. "ubuntu-latest-8-cores" or your org/repo custom larger-runner label.
    runs-on: ${{ vars.INTEGRATION_RUNNER_LABEL || 'ubuntu-latest' }}
    needs: unit
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Fixed cache key — the model doesn't change between runs.
      # Bump to "ollama-qwen2.5-7b-v2" etc. to force a fresh pull.
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-qwen2.5-7b-v1

      # Mount the cached model dir into the container so pulls are skipped.
      - name: Start Ollama
        run: |
          docker run -d \
            --name ollama \
            -p 11434:11434 \
            -v $HOME/.ollama:/root/.ollama \
            ollama/ollama:latest
          timeout 30 bash -c 'until curl -sf http://localhost:11434/api/tags; do sleep 2; done'
          echo "Ollama ready"

      # If the model is already in the cache this just verifies the digest
      # and prints "up to date" — no re-download.
      - name: Pull qwen2.5:7b
        run: docker exec ollama ollama pull qwen2.5:7b

      # Start the app with Ollama as both routing and structuring LLM.
      # python-dotenv won't override these env vars even if a .env file exists.
      - name: Start FastAPI app
        env:
          ROUTING_LLM: ollama
          STRUCTURING_LLM: ollama
          OLLAMA_MODEL: qwen2.5:7b
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > app.log 2>&1 &
          timeout 30 bash -c 'until curl -sfL http://127.0.0.1:8000/; do sleep 2; done'
          echo "App ready"

      - name: Run integration tests
        env:
          ROUTING_LLM: ollama
          STRUCTURING_LLM: ollama
          OLLAMA_MODEL: qwen2.5:7b
          CHAT_TIMEOUT: "300"
          CHAT_RETRIES: "1"
        run: |
          bash tools/test.sh integration

      # Grab the server log when something goes wrong so failures are diagnosable.
      - name: Upload app log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: reports/junit/integration.xml
