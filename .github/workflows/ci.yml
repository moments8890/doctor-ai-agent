name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Dependency-vulnerability audit gate ──────────────────────────
  # Fails on HIGH/CRITICAL CVEs in pip or npm production deps. Catches
  # new CVEs the day they're published instead of when someone reads
  # the next quarterly audit.
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: pip-audit (Python deps)
        run: |
          pip install --upgrade pip pip-audit
          pip install -r requirements.txt
          # --strict fails on any vulnerability. The two ignored IDs
          # have no upstream fix available as of last review; revisit
          # whenever the audit tooling reports a fix version.
          #   CVE-2026-3219    pip itself (no fix shipped)
          #   CVE-2025-69872   diskcache 5.6.3 (no fix shipped)
          pip-audit --strict \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2025-69872 \
            || {
              echo "::warning::pip-audit reported new vulnerabilities — bump in requirements.txt"
              exit 1
            }

      - name: npm audit (frontend production deps)
        working-directory: frontend/web
        run: |
          npm ci --omit=dev --silent
          # --omit=dev skips vite et al; prod only ships the build
          # output. --audit-level=high fails on high+critical only;
          # moderate gets logged for visibility.
          npm audit --omit=dev --audit-level=high

  # ── Fast unit tests (mocked, no LLM/server needed) ───────────────
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: bash scripts/test.sh unit

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/junit/unit.xml
          retention-days: 14

  # ── Integration tests (real LLM via Groq, running server) ────────
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: unit-tests
    env:
      ROUTING_LLM: groq
      STRUCTURING_LLM: groq
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ENVIRONMENT: test
      PYTHONPATH: src
      PATIENTS_DB_PATH: ${{ github.workspace }}/data/patients.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create data dir
        run: mkdir -p data reports/logs

      - name: Start server
        run: |
          cd src && python -m uvicorn main:app --host 0.0.0.0 --port 8001 \
            > "$GITHUB_WORKSPACE/reports/logs/server.log" 2>&1 &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8001/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8001/healthz || {
            echo "Server failed to start. Logs:"
            cat "$GITHUB_WORKSPACE/reports/logs/server.log"
            exit 1
          }

      - name: Run integration tests
        run: bash scripts/test.sh integration-full
        env:
          INTEGRATION_SERVER_URL: http://127.0.0.1:8001
          CHAT_TIMEOUT: "120"

      - name: Show server logs on failure
        if: failure()
        run: cat "$GITHUB_WORKSPACE/reports/logs/server.log" 2>/dev/null || echo "No server logs"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: reports/junit/integration.xml
          retention-days: 14

  # ── Regression tests (deterministic extraction + workflow) ─────────
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: unit-tests
    env:
      ROUTING_LLM: groq
      STRUCTURING_LLM: groq
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ENVIRONMENT: test
      PYTHONPATH: src
      PATIENTS_DB_PATH: ${{ github.workspace }}/data/patients.db
      RUN_REGRESSION: "1"
      INTEGRATION_SERVER_URL: http://127.0.0.1:8001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create data dir
        run: mkdir -p data reports/logs

      - name: Start server
        run: |
          cd src && python -m uvicorn main:app --host 0.0.0.0 --port 8001 \
            > "$GITHUB_WORKSPACE/reports/logs/server.log" 2>&1 &
          echo "Waiting for server..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8001/docs > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8001/docs || {
            echo "Server failed to start. Logs:"
            cat "$GITHUB_WORKSPACE/reports/logs/server.log"
            exit 1
          }

      - name: Run regression tests
        run: |
          python -m pytest tests/regression/ -v \
            --junitxml=reports/junit/regression.xml \
            --tb=short

      - name: Show server logs on failure
        if: failure()
        run: cat "$GITHUB_WORKSPACE/reports/logs/server.log" 2>/dev/null || echo "No server logs"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-report
          path: reports/junit/regression.xml
          retention-days: 14

  # ── Publish test results as PR comment ─────────────────────────────
  publish-results:
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [unit-tests, integration-tests, regression-tests]
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download unit test report
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: reports/
        continue-on-error: true

      - name: Download integration test report
        uses: actions/download-artifact@v4
        with:
          name: integration-test-report
          path: reports/
        continue-on-error: true

      - name: Download regression test report
        uses: actions/download-artifact@v4
        with:
          name: regression-test-report
          path: reports/
        continue-on-error: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/**/*.xml
          comment_title: "Test Results"
          check_name: "Test Results"

  # ── Frontend build check ─────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install and build
        run: |
          cd frontend/web
          npm ci
          npm run build
