name: AI PR Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Post AI Review Comment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR diff
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          git diff --unified=0 "origin/${{ github.base_ref }}...${{ github.sha }}" > pr.diff
          head -c 120000 pr.diff > pr-trimmed.diff

      - name: Generate AI review text
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          node <<'EOF'
          const fs = require("fs");

          const outputPath = process.env.GITHUB_OUTPUT;
          const apiKey = process.env.OPENAI_API_KEY;
          const model = process.env.OPENAI_MODEL || "gpt-4.1-mini";

          if (!apiKey) {
            fs.appendFileSync(outputPath, "review_body<<__EOF__\n");
            fs.appendFileSync(outputPath, "AI review skipped: `OPENAI_API_KEY` repo secret is not set.\n");
            fs.appendFileSync(outputPath, "__EOF__\n");
            process.exit(0);
          }

          const diff = fs.readFileSync("pr-trimmed.diff", "utf8");
          const title = process.env.PR_TITLE || "";
          const body = process.env.PR_BODY || "";

          const system = [
            "You are a strict senior software reviewer.",
            "Review only what appears in this pull request diff.",
            "Be concise, concrete, and actionable.",
            "Focus on correctness, security, reliability, and tests.",
            "If no major issues, explicitly say so and provide small improvement suggestions."
          ].join(" ");

          const user = [
            `PR title: ${title}`,
            "",
            "PR description:",
            body,
            "",
            "Unified diff:",
            diff,
            "",
            "Return markdown with these sections:",
            "1) Summary",
            "2) Findings (severity: high/medium/low)",
            "3) Test recommendations"
          ].join("\n");

          async function run() {
            const res = await fetch("https://api.openai.com/v1/responses", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model,
                input: [
                  { role: "system", content: [{ type: "input_text", text: system }] },
                  { role: "user", content: [{ type: "input_text", text: user }] }
                ],
                max_output_tokens: 900
              })
            });

            if (!res.ok) {
              const text = await res.text();
              throw new Error(`OpenAI API error ${res.status}: ${text}`);
            }

            const data = await res.json();
            const reviewText = (data.output_text || "").trim() || "AI review returned no content.";
            fs.appendFileSync(outputPath, "review_body<<__EOF__\n");
            fs.appendFileSync(outputPath, `${reviewText}\n`);
            fs.appendFileSync(outputPath, "__EOF__\n");
          }

          run().catch((err) => {
            const msg = `AI review failed: ${String(err.message || err)}`;
            fs.appendFileSync(outputPath, "review_body<<__EOF__\n");
            fs.appendFileSync(outputPath, `${msg}\n`);
            fs.appendFileSync(outputPath, "__EOF__\n");
          });
          EOF

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.ai.outputs.review_body }}
        with:
          script: |
            const body = [
              "## AI Review Bot",
              "",
              process.env.REVIEW_BODY || "No review generated."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
