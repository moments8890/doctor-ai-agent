name: Auto Enable PR Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const pull = context.payload.pull_request;
            const nodeId = pull.node_id;
            try {
              await github.graphql(
                `
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                    }
                  }
                }
                `,
                { pullRequestId: nodeId }
              );
              core.info(`Enabled auto-merge for PR #${pull.number}`);
            } catch (err) {
              const msg = String(err?.message || err);
              if (msg.includes("Resource not accessible by integration")) {
                core.warning(
                  `Skipped auto-merge for PR #${pull.number}: token lacks permission. ` +
                  `Ensure repository Actions permissions are Read and write.`
                );
              } else {
                throw err;
              }
            }
