- description: "routine drug side-effect → mirrors patient vocabulary, no over-escalation"
  options:
    prompts: [followup_reply]
  vars:
    patient_name: "王女士"
    patient_message: "医生，开浦兰吃了三天有点犯困，影响开车，怎么办？"
    doctor_knowledge: "[KB-5] 抗癫痫药物随访规则：左乙拉西坦（开浦兰）嗜睡常见，1-2周适应。"
  assert:
    - type: javascript
      value: "!/立即去急诊/.test(output)"
    - type: javascript
      value: "/(开浦兰|犯困|嗜睡)/.test(output)"   # mirrors patient's vocabulary
