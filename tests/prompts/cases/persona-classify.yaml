    prompts: [persona-classify]
  vars:
    original: "如疼痛明显，可服用布洛芬缓解。"
    edited: "如疼痛明显，可服用对乙酰氨基酚缓解，您对布洛芬过敏，请避免使用。"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const o = JSON.parse(output);
        // Both readings are defensible: context_specific (this patient's
        // allergy) or factual (allergic patients should avoid the drug —
        // generalizable rule). Either shouldn't block the doctor.
        if (o.type === 'context_specific') {
          return o.persona_field === '' && o.kb_category === '' && o.proposed_kb_rule === '';
        }
        return o.type === 'factual' && ["medication", "custom"].includes(o.kb_category) && o.proposed_kb_rule.length > 0;

