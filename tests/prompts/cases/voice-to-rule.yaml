- description: "empty specialty variable handled"
  options:
    prompts: [voice-to-rule]
  vars:
    transcript: "高血压患者收缩压要控制在140以下"
    specialty: ""
  assert:
    - type: is-json
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.error === null;

- description: "output parses as JSON regardless of fence formatting"
  options:
    prompts: [voice-to-rule]
  vars:
    transcript: "术后第三天拆线"
    specialty: ""
  assert:
    - type: javascript
      value: |
        // Accept either pure JSON or JSON wrapped in a ```json fence
        const stripped = output.trim().replace(/^```json\s*|\s*```$/g, '');
        try { JSON.parse(stripped); return true; } catch (_) { return false; }

