# Test cases for patient-extract.md
# Prompt: patient pre-consultation interview → 7-field structured JSON
# Fields: chief_complaint, present_illness, past_history, allergy_history,
#   family_history, personal_history, marital_reproductive

- description: "patient-extract: full interview — all 7 fields"
  options:
    prompts: [patient-extract]
  vars:
    name: "王梅"
    gender: "女"
    age: "45"
    transcript: |
      AI助手：请问您今天主要是什么不舒服？
      患者：我头疼，已经快两周了，最近三天越来越厉害。
      AI助手：头疼加重了，有没有伴随其他不适？
      患者：有时候恶心，吐过两次。
      AI助手：了解。之前有没有什么疾病或做过手术？
      患者：有高血压，吃了十年的药了。
      AI助手：对什么药物或食物过敏吗？
      患者：没有过敏的。
      AI助手：家里人有没有类似的疾病？
      患者：我爸有高血压。
      AI助手：平时抽烟喝酒吗？
      患者：不抽烟，偶尔喝点。
      AI助手：结婚了吗？有孩子吗？
      患者：结婚了，一个儿子。
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.chief_complaint && obj.chief_complaint.includes('头');
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.present_illness && obj.present_illness.length > 5;
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.past_history && obj.past_history.includes('高血压');
    - type: javascript
      value: |
        // "没有过敏的" should map to "无"
        const obj = JSON.parse(output);
        return obj.allergy_history === '无';
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.family_history && obj.family_history.includes('高血压');
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.personal_history && (obj.personal_history.includes('不吸烟') || obj.personal_history.includes('不抽烟'));
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.marital_reproductive && obj.marital_reproductive.length > 0;

- description: "patient-extract: negatives — 没有/身体挺好 maps to 无"
  options:
    prompts: [patient-extract]
  vars:
    name: "刘芳"
    gender: "女"
    age: "38"
    transcript: |
      AI助手：之前有什么疾病吗？
      患者：没有，身体一直挺好的。
      AI助手：对药物或食物过敏吗？
      患者：没有。
      AI助手：家里人有没有高血压、糖尿病之类的？
      患者：我爸有糖尿病。
      AI助手：结婚了吗？有孩子吗？
      患者：结婚了，一个女儿。
  assert:
    - type: is-json
    - type: javascript
      value: |
        // "没有/身体挺好" → "无"
        const obj = JSON.parse(output);
        return obj.past_history === '无';
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.allergy_history === '无';
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.family_history && obj.family_history.includes('糖尿病');
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.marital_reproductive && obj.marital_reproductive.length > 0;

- description: "patient-extract: off-topic filtering"
  options:
    prompts: [patient-extract]
  vars:
    name: "陈明"
    gender: "男"
    age: "52"
    transcript: |
      AI助手：请问您今天来看什么问题？
      患者：我上个月体检拍CT说有肺结节。
      AI助手：好的，什么时候做的？
      患者：上个月。对了，你们医院停车场在哪？
      AI助手：停车场的问题到了医院可以问导诊台。发现肺结节后有什么不舒服吗？
      患者：没什么感觉，就是偶尔咳嗽。不知道严不严重。
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.chief_complaint && obj.chief_complaint.includes('肺结节');
    - type: javascript
      value: |
        // "停车场" is off-topic and must not appear in any field
        const all = Object.values(JSON.parse(output)).join('');
        return !all.includes('停车场');
    - type: javascript
      value: |
        // "不知道严不严重" is patient worry, not clinical
        const all = Object.values(JSON.parse(output)).join('');
        return !all.includes('严不严重');
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.present_illness && obj.present_illness.includes('咳嗽');

- description: "patient-extract: partial info — only mentioned fields"
  options:
    prompts: [patient-extract]
  vars:
    name: "赵丽"
    gender: "女"
    age: "28"
    transcript: |
      AI助手：请问您今天来看什么问题？
      患者：我最近老是失眠，大概有一个月了。
      AI助手：有没有其他不舒服？
      患者：有时候头晕。
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.chief_complaint && obj.chief_complaint.includes('失眠');
    - type: javascript
      value: |
        // Fields not discussed should be empty string
        const obj = JSON.parse(output);
        return obj.past_history === '' || obj.past_history === undefined;
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.allergy_history === '' || obj.allergy_history === undefined;
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.family_history === '' || obj.family_history === undefined;
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.marital_reproductive === '' || obj.marital_reproductive === undefined;
