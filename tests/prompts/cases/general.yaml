# Test cases for general.md
# Prompt: general conversation — greetings, guidance, non-clinical requests
# Output: plain text Chinese reply (NOT JSON)

- description: "general: greeting — short, not robotic"
  options:
    prompts: [general]
  vars:
    message: "你好"
  assert:
    - type: javascript
      value: |
        // Should NOT repeat "我是AI助手" or list all features
        return !output.includes('我是') || output.length < 40;
    - type: javascript
      value: |
        // Should be short (1-2 sentences)
        return output.length < 80;
    - type: not-contains
      value: '"intent"'

- description: "general: medical advice request — decline and redirect"
  options:
    prompts: [general]
  vars:
    message: "这个药吃多少"
  assert:
    - type: javascript
      value: |
        // Should NOT provide specific dosage advice
        return !output.match(/\d+mg/) && !output.match(/\d+片/);
    - type: javascript
      value: |
        // Should redirect to doctor's own judgment or offer to check records
        return output.includes('医') || output.includes('病历') || output.includes('查');
    - type: not-contains
      value: '"intent"'

- description: "general: ambiguous request — ask clarifying question"
  options:
    prompts: [general]
  vars:
    message: "帮我查个东西"
  assert:
    - type: javascript
      value: |
        // Should ask a clarifying question (contains ？)
        return output.includes('？') || output.includes('?');
    - type: javascript
      value: |
        // Should be short
        return output.length < 60;

- description: "general: off-topic — acknowledge then redirect"
  options:
    prompts: [general]
  vars:
    message: "今天天气怎么样"
  assert:
    - type: javascript
      value: |
        // Should not fabricate weather info
        return !output.includes('晴') && !output.includes('度') && !output.includes('雨');
    - type: javascript
      value: |
        // Should redirect to medical functions
        return output.includes('患者') || output.includes('病历') || output.includes('帮');
