# Test cases for general.md
# Prompt: general conversation — greetings, guidance, non-clinical requests
# Output: plain text Chinese reply (NOT JSON)

- description: "general: greeting — polite intro with AI role"
  options:
    prompts: [general]
  vars:
    message: "你好"
  assert:
    - type: javascript
      value: |
        // Should mention being an AI assistant
        return output.includes('助手') || output.includes('AI') || output.includes('智能');
    - type: javascript
      value: |
        // Should mention available features
        return output.includes('病历') || output.includes('查询') || output.includes('任务');
    - type: not-contains
      value: '"intent"'

- description: "general: medical advice request — decline and redirect"
  options:
    prompts: [general]
  vars:
    message: "这个药吃多少"
  assert:
    - type: javascript
      value: |
        // Should NOT provide specific dosage advice
        return !output.match(/\d+mg/) && !output.match(/\d+片/);
    - type: javascript
      value: |
        // Should redirect to doctor/professional
        return output.includes('医生') || output.includes('药师') || output.includes('咨询');
    - type: not-contains
      value: '"intent"'

- description: "general: feature guidance — direct to record creation"
  options:
    prompts: [general]
  vars:
    message: "我想录入病人信息"
  assert:
    - type: javascript
      value: |
        // Should mention record/病历 related guidance
        return output.includes('病历') || output.includes('录入') || output.includes('创建') || output.includes('记录');
    - type: not-contains
      value: '"intent"'
