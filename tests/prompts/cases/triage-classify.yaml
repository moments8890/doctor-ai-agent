# --- urgent (highest priority — must never be missed) ---

- description: "triage: chest pain + dyspnea → urgent"
  options:
    prompts: [triage-classify]
  vars:
    message: "胸口突然很痛，喘不上来气"
    patient_context: '{"diagnosis": "冠心病"}'
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.category === 'urgent';
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.confidence >= 0.8;

- description: "triage: consciousness change → urgent"
  options:
