# Test cases for triage-classify.md
# Prompt: patient message → {category, confidence} JSON
# Safety-critical: wrong classification can suppress clinical content.
# 3-category model: intake | informational | other

# --- informational (pure info, no symptoms described) ---

- description: "triage: medication timing → informational"
  options:
    prompts: [triage-classify]
  vars:
    message: "我的药什么时候吃？饭前还是饭后？"
    patient_context: '{"diagnosis": "高血压", "medications": ["氨氯地平5mg每日一次"]}'
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.category === 'informational';
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.confidence >= 0.7;

- description: "triage: appointment query → informational"
  options:
    prompts: [triage-classify]
  vars:
    message: "下次复查是什么时候？"
    patient_context: '{"tasks": [{"title": "复查血常规", "due_at": "2026-04-01"}]}'
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.category === 'informational';

