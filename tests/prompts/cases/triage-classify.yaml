# --- general_question (safe default for ambiguous) ---

- description: "triage: vague message → general_question"
  options:
    prompts: [triage-classify]
  vars:
    message: "我想问个问题但不知道怎么说"
    patient_context: '{"diagnosis": "高血压"}'
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.category === 'general_question';

# --- mixed content (should classify to more clinical category) ---

- description: "triage: info + symptom mixed → symptom_report (clinical priority)"
  options:
    prompts: [triage-classify]
  vars:
    message: "想问一下药怎么吃，另外最近有点咳嗽"
    patient_context: '{"diagnosis": "脑膜瘤术后"}'
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.category === 'symptom_report';

- description: "triage: info + side effect mixed → side_effect (clinical priority)"
  options:
    prompts: [triage-classify]
  vars:
    message: "下次什么时候复查？对了吃了那个新药以后老是拉肚子"
    patient_context: '{"medications": ["左乙拉西坦500mg(新增)"]}'
  assert:
    - type: is-json
    - type: javascript
      value: |
        const obj = JSON.parse(output);
        return obj.category === 'side_effect' || obj.category === 'symptom_report';
