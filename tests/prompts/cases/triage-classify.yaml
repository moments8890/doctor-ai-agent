    prompts: [triage-classify]
  vars:
    message: "头痛比昨天严重了，吃止疼药也不管用"
    patient_context: '{"diagnosis": "脑膜瘤术后第5天"}'
  assert:
    - type: is-json
    - type: javascript
      value: |
