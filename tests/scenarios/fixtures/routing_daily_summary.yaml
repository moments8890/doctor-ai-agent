id: routing-daily-summary-001
title: "Routing: daily_summary intent classification"
tags: [routing, daily_summary]

setup:
  patients: []

steps:
  - id: explicit_summary
    call: route
    input:
      text: "今日总结"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: daily_summary

  - id: how_many_patients
    call: route
    input:
      text: "我今天看了多少病人"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: daily_summary

  - id: todays_work
    call: route
    input:
      text: "今天的工作情况"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: daily_summary

  - id: daily_recap
    call: route
    input:
      text: "每日小结"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: daily_summary

  # Negative cases — should NOT be daily_summary
  - id: not_summary_greeting
    call: route
    input:
      text: "你好"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: general

  - id: not_summary_query
    call: route
    input:
      text: "查张三的病历"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: query_record
