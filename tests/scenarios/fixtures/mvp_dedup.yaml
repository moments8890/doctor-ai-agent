id: mvp-dedup
title: "MVP: duplicate create reuses same patient"
tags: [mvp, dedup]

setup:
  patients: []

steps:
  - id: create1
    call: handle_turn
    input:
      text: "创建患者周宁，女48岁，门诊。高血压3年。"
      identity: ${doctor_id}
    expect:
      hard:
        data._routing.intent: create_record
        data._routing.patient_name: 周宁
        data.session_id.exists: true

  - id: confirm1
    call: doctor_interview.confirm
    input:
      doctor_id: ${doctor_id}
      session_id: ${steps.create1.data.session_id}
    expect:
      hard:
        record_id.exists: true

  - id: create2
    call: handle_turn
    input:
      text: "再建一次同一位患者周宁，女48岁，门诊。"
      identity: ${doctor_id}
    expect:
      hard:
        data._routing.intent: create_record
        data._routing.patient_name: 周宁

  - id: confirm2
    call: doctor_interview.confirm
    input:
      doctor_id: ${doctor_id}
      session_id: ${steps.create2.data.session_id}
    expect:
      hard:
        record_id.exists: true

  - id: verify_dedup
    call: handle_turn
    input:
      text: "所有患者"
      identity: ${doctor_id}
    expect:
      hard:
        db.patients.min_count: 1
        db.medical_records.min_count: 2
