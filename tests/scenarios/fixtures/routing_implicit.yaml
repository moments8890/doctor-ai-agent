id: routing-implicit-001
title: "Routing: implicit create_record without trigger word"
tags: [routing, edge_case]

setup:
  patients: []

steps:
  - id: implicit_create
    call: route
    input:
      text: "李明，男55岁，肺炎，发热38.5度"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: create_record
        patient_name: 李明

  - id: ambiguous_query
    call: route
    input:
      text: "张三上次的药还有吗"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: query_record
        patient_name: 张三

  - id: pure_greeting
    call: route
    input:
      text: "你好"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: general

  - id: list_all
    call: route
    input:
      text: "所有患者"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: query_patient
