id: mvp-query-tasks
title: "MVP: query tasks routes correctly"
tags: [mvp, routing, tasks]

setup:
  patients: []

steps:
  - id: my_tasks
    call: route
    input:
      text: "我的任务"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: query_task

  - id: pending_tasks
    call: route
    input:
      text: "待处理的任务"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: query_task

  - id: handle_tasks
    call: handle_turn
    input:
      text: "我的任务"
      identity: ${doctor_id}
    expect:
      hard:
        data._routing.intent: query_task
