id: mvp-list-patients
title: "MVP: list patients routes correctly"
tags: [mvp, routing, list]

setup:
  patients:
    - ref: p1
      name: 李明
      gender: 男
      age: 55

steps:
  - id: list_all
    call: route
    input:
      text: "所有患者"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: query_patient

  - id: list_handle
    call: handle_turn
    input:
      text: "所有患者"
      identity: ${doctor_id}
    expect:
      hard:
        data._routing.intent: query_patient
