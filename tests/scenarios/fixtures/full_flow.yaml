id: full-flow-001
title: "Full flow: start intake → turn → confirm record"
tags: [workflow, full_flow]

setup:
  patients:
    - ref: p1
      name: 张伟
      gender: 男
      age: 50

steps:
  - id: start
    call: doctor_intake.start
    input:
      patient_id: ${patients.p1}
      mode: doctor
    expect:
      hard:
        session_id.exists: true
        status: active

  - id: turn_1
    call: doctor_intake.turn
    input:
      session_id: ${steps.start.session_id}
      text: "张伟，男50岁，头痛两周加重三天，伴恶心呕吐。既往高血压。查体视乳头水肿。MRI示右额叶占位。"
    expect:
      hard:
        status: active

  - id: confirm
    call: doctor_intake.confirm
    input:
      session_id: ${steps.start.session_id}
    expect:
      hard:
        record_id.exists: true
        status: pending_review
