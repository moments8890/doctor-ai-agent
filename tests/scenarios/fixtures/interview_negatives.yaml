id: interview-negatives-001
title: "Interview: negative values count as collected"
tags: [interview, extraction]

setup:
  patients:
    - ref: p1
      name: 李强
      gender: 男
      age: 40

steps:
  - id: start
    call: doctor_interview.start
    input:
      patient_id: ${patients.p1}
      mode: doctor
      initial_fields:
        chief_complaint: "头痛三天"
    expect:
      hard:
        session_id.exists: true
        status: interviewing

  - id: negatives
    call: doctor_interview.turn
    input:
      session_id: ${steps.start.session_id}
      text: "无特殊既往史，无药物过敏，无家族遗传病史，不吸烟不饮酒"
    expect:
      hard:
        collected.past_history.contains_any: ["无"]
        collected.allergy_history.contains_any: ["无"]
        collected.family_history.contains_any: ["无"]
        collected.personal_history.contains_any: ["不吸烟", "不饮酒"]
