id: mvp-query-history
title: "MVP: create → confirm → query record by name"
tags: [mvp, query_history]

setup:
  patients: []

steps:
  - id: create
    call: handle_turn
    input:
      text: "创建患者王丽，女62岁，心内门诊。既往HFpEF，今晨端坐呼吸，BP 158/96，HR 112，SpO2 89%，BNP 1860 pg/mL，呋塞米40mg iv。"
      identity: ${doctor_id}
    expect:
      hard:
        data._routing.intent: create_record
        data._routing.patient_name: 王丽
        data.session_id.exists: true

  - id: confirm
    call: doctor_interview.confirm
    input:
      doctor_id: ${doctor_id}
      session_id: ${steps.create.data.session_id}
    expect:
      hard:
        record_id.exists: true

  - id: query
    call: handle_turn
    input:
      text: "查王丽刚才那条记录"
      identity: ${doctor_id}
    expect:
      hard:
        data._routing.intent: query_record
        data._routing.patient_name: 王丽
