id: mvp-greeting-safety
title: "MVP: greeting should not trigger clinical action"
tags: [mvp, safety, routing]

setup:
  patients: []

steps:
  - id: greeting
    call: route
    input:
      text: "你好"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: general

  - id: greeting_variant
    call: route
    input:
      text: "早上好"
      doctor_id: ${doctor_id}
      history: []
    expect:
      hard:
        intent: general

  - id: verify_no_writes
    call: handle_turn
    input:
      text: "你好"
      identity: ${doctor_id}
    expect:
      hard:
        db.patients.min_count: 0
        db.medical_records.min_count: 0
