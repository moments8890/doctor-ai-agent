[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = sqlite:///./patients.db

# Logging is managed by utils/log.py (structlog). The [loggers] section is
# intentionally omitted so that fileConfig() in env.py does not reset the
# root logger's handlers and remove our RotatingFileHandler for app.log.
