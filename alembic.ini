[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = sqlite:///./patients.db

# Logging is managed by utils/log.py (structlog). The fileConfig() call in
# env.py is intentionally skipped so that these sections do NOT reset the
# root logger's handlers when running inside the app process.
# These sections are kept here for standalone `alembic` CLI compatibility.

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
