  # KB-9: LVA治疗AD的理论依据与当前问题
  - title: "LVA治疗AD的理论依据与当前问题"
    category: "diagnosis"
    source: "陆华教授综述文章"
    source_url: "https://mp.weixin.qq.com/s/meFaGePQdNM-Cx9Hsmy4Yg"
    content: |
      【AD流行病学】
      中国约有1000万AD患者（2024年数据）。
      现有药物：胆碱酯酶抑制剂（多奈哌齐、卡巴拉汀、加兰他敏）+ NMDA拮抗剂（美金刚）。
      新型抗Abeta单抗（Lecanemab, Donanemab）2023年获批但年费约18万美元且有ARIA副作用。
      AD III期药物试验失败率：97.3%。
      【脑淋巴系统】
      胶质淋巴系统（2012年发现）+ 脑膜淋巴管（2015年Nature确认）
      共同清除Abeta和Tau蛋白。功能障碍形成恶性循环。
      【LVA手术机制】
      绕过功能障碍的颈深淋巴结，使脑淋巴直接引流入静脉系统。
      原本用于周围性淋巴水肿（肿瘤术后）。
      【当前问题】
      1. 动物模型证据不足
      2. 无统一手术适应证和标准
      3. 术者技术水平参差
      4. 首次手术失败可能影响修复手术机会

  # KB-10: AD-LVB小鼠模型实验结果
  - title: "AD-LVB小鼠模型实验结果（国际首创）"
    category: "diagnosis"
    source: "陆华教授实验研究"
    source_url: "https://mp.weixin.qq.com/s/VkXBL3TXiQcAzLrHl3-Ekw"
    content: |
      【实验模型】
      APP/PS1转基因AD小鼠，超显微外科技术行颈深淋巴结-静脉分流术。
      国际首个颈深LVB治疗AD的小鼠模型。
      【关键发现】
      1. AD小鼠颈深淋巴功能较同龄野生小鼠明显下降
      2. 成功的LVB可增加颈深淋巴流量，加快脑内Abeta清除
      3. 改善AD小鼠认知功能
      4. 重要发现：吻合口不通畅（狭窄/血栓）时，Abeta反而增加，加重认知障碍
      【病理发现】
      AD小鼠颈深淋巴结：髓索增生、淋巴窦缩小
      推测：淋巴结结构性病变导致脑淋巴流动障碍，是AD进展的重要机制
      【技术创新】
      软腭ICG注射法：损伤小、可重复，替代延髓池注射
      小鼠颈深淋巴结直径1-5mm，采用淋巴结-静脉吻合（非淋巴管-静脉）
