knowledge:
  # KB-1: 破裂动脉瘤术后危险信号
  - title: "破裂动脉瘤术后危险信号与血管痉挛管理"
    category: "diagnosis"
    source: "中国破裂颅内动脉瘤临床管理指南(2024版)"
    source_url: "https://www.brainmed.com/info/detail?id=45871"
    content: |
      【术后关键并发症】
      1. 脑血管痉挛(CVS)：通常于SAH后3-4天出现，7-10天达高峰
         - 药物：口服尼莫地平60mg，每4小时1次，共21天
         - 监测：经颅多普勒超声(TCD)，CTA/CTP评估
         - 维持正常血容量，避免低血压
      2. 再出血：颅内压应维持<20mmHg
      3. 脑积水：
         - 急性：脑室外引流(EVD)
         - 慢性（术后数周-数月）：永久性脑室腹腔分流
      【危险信号——需立即就医】
      - 新发或进行性加重的头痛（与术前性质不同）
      - 恶心呕吐加重
      - 意识水平下降（GCS评分下降）
      - 血压突然升高（>160/95mmHg）
      - 新发肢体无力或麻木
      - 视物模糊
      - 癫痫发作
      以上征象在术后7-14天出现时尤需警惕，此为血管痉挛高发期。

  # KB-2: 抗癫痫药物管理
  - title: "抗癫痫药物管理(AVM术后)"
    category: "medication"
    source: "脑血管畸形(AVM)治疗常见问题"
    source_url: "https://www.haodf.com/neirong/wenzhang/2277026504.html"
    content: |
      【用药原则】
      - 有癫痫表现者术前应用抗癫痫药物
      - 所有AVM术后患者均应常规应用抗癫痫药物
      - 术后口服3个月，未出现癫痫发作可减半量口服2周后停药
      - 有癫痫发作者需服药至最后一次发作1年后，行脑电图检查后决定下一步方案
      【常用药物及副作用】
      左乙拉西坦(开浦兰)：
      - 常见副作用：易激惹、情绪不稳(5-10%)、嗜睡、头晕
      - 严重时可考虑换用丙戊酸钠或拉莫三嗪
      丙戊酸钠：
      - 起始250mg bid，维持500-1000mg/日
      - 注意肝功能监测、血小板计数
      【重要提醒】
      - 禁止自行停药或减量
      - 避免饮酒、咖啡、浓茶等兴奋性饮料
      - 避免闪光刺激（歌舞厅、长时间看手机）
      - 保证充足睡眠，避免过度疲劳

  # KB-3: 颅内动脉瘤介入栓塞术后随访
  - title: "颅内动脉瘤介入栓塞术后随访方案"
    category: "followup"
    source: "颅内动脉瘤介入术后常见疑问解答(健康界)"
    source_url: "https://www.cn-healthcare.com/articlewm/20211227/content-1300152.html"
    content: |
      【随访时间表】
      术后1月：门诊复查（穿刺点愈合，颅脑CT排除脑积水）
      术后3月：回院随访，MRA或CTA评估
      术后6月：回院随访，DSA造影评估栓塞效果（推荐）
      术后12月：DSA造影评估有无复发
      术后24月：CTA或MRA随访
      之后：每年MRA随访
      【药物方案】
      - 单纯弹簧圈栓塞：通常无需抗血小板药物
      - 支架辅助栓塞：术后双抗3月（阿司匹林100mg/日+氯吡格雷75mg/日），后改单抗1年
      - 破裂动脉瘤：尼莫地平60mg/次，3次/日，持续3个月
      - 他汀类：阿托伐他汀20mg/晚 或 瑞舒伐他汀10mg/晚
      【血压控制目标】
      - 非糖尿病：<140/90mmHg
      - 糖尿病：<135/85mmHg
      - >=70岁：<150/90mmHg
      【生活管理】
      - 术后24小时可下地活动
      - 完全愈合需6月-1年，术后6月复查无残留/复发可恢复正常工作
      - 弹簧圈/支架可兼容<=3.0T磁共振检查，可正常乘坐飞机
      - 严格戒烟戒酒，低盐低脂饮食，保持排便通畅
      - 避免用力排便、大笑、剧烈咳嗽

  # KB-4: CEA术后管理
  - title: "CEA术后管理方案"
    category: "followup"
    source: "CEA万字记录(脑医汇)"
    source_url: "https://www.brainmed.com/info/detail?id=25734"
    content: |
      【血压管理】
      - 目标：<130/80mmHg（>=75岁可<140/90mmHg）
      - 约2/3 CEA患者术后出现高血压
      - 避免过度降压（考虑对侧脑灌注和冠脉状态）
      - beta受体阻滞剂可用于目标化管理（心率60-80次/分）
      【药物方案】
      抗血小板：
      - 补片CEA：术后双抗3个月，后改单抗长期维持
      - 外翻CEA：单抗长期维持
      - 围手术期不得停用抗血小板药物
      降脂：
      - LDL-c目标：<1.4mmol/L 或降幅>50%
      - 首选他汀类（阿托伐他汀/瑞舒伐他汀）
      - 未达标可加用依折麦布10mg/日
      血糖（合并糖尿病时）：
      - 空腹6-8mmol/L，餐后8-10mmol/L，HbA1c<7%
      【随访时间表】
      术后1月 → 3月 → 6月 → 12月 → 24月 → 之后每年
      - 每次随访行颈动脉超声评估再狭窄
      - 监测血脂、血糖、血压达标情况

  # KB-5: 烟雾病搭桥术后康复
  - title: "烟雾病搭桥术后康复指南"
    category: "followup"
    source: "烟雾病治疗中国专家共识(2019)"
    source_url: "https://www.cn-healthcare.com/articlewm/20201123/wap-content-1165488.html"
    content: |
      【术后高灌注综合征(CHS)】
      - 发病率15%-27.5%
      - 表现：头痛、恶心、癫痫发作、局灶性神经功能障碍
      - 处理：严格控制血压，收缩压目标110-130mmHg
      - 注意：过度降压可能导致急性脑缺血梗死
      【搭桥血管评估】
      术后3月：CTA评估搭桥血管通畅情况
      术后6月：CTA或DSA复查
      术后12月：DSA评估桥血管通畅及代偿情况
      之后每年随访
      【功能恢复预期】
      - 术后6月：约56.52%患者认知功能改善
      - 肢体精细运动障碍：术后6月内逐渐改善
      - 主要随访事件：死亡、再出血、新发脑梗死、TIA
      【双侧病变分期手术】
      - 通常左侧术后3-6个月评估效果后再安排对侧手术
      【生活管理】
      - 避免脱水、贫血、过度换气
      - 充足饮水，避免高温环境

  # KB-6: 颈深淋巴静脉分流术(LVB)治疗AD
  - title: "颈深淋巴静脉分流术(LVB)治疗AD"
    category: "diagnosis"
    source: "陆华教授专访(神外前沿)"
    source_url: "https://mp.weixin.qq.com/s/Mr6kJEZK_K8_ecI5Y5HlFA"
    content: |
      【手术原理】
      颈深淋巴静脉分流术(LVB)：重建颅内淋巴液与血液系统的连接，
      使脑淋巴避开有功能障碍的颈深淋巴系统，出颅后直接进入血液系统，
      从而增加脑淋巴流量，加快脑内Abeta蛋白清除，改善AD认知功能。
      【脑淋巴循环全流程通路理论（陆华教授提出）】
      胶质淋巴（中央通路）+ 脑膜淋巴 + 颈深淋巴（周围通路）= 脑淋巴循环全流程通路
      颈深淋巴系统是脑淋巴出颅后的主要通路，也是进入血液系统的最终通道。
      【临床试验】
      注册号：NCT06448975 (ClinicalTrials.gov)
      设计：前瞻性、单臂、单中心研究，计划入组30例
      评估指标：AD量表(MMSE, CDR, GDS) + 术前术后PET扫描 + MRI黑血序列
      【术后效果】
      - 多数患者术后认知功能有不同程度改善（记忆、情绪、行为）
      - 部分患者无改善或改善后复发
      - 手术成功不直接等于改善——可能与个体差异、吻合口通畅性有关
      【ICG导航技术（陆华教授创新）】
      鼻黏膜ICG注射法：麻醉后双侧下鼻甲及鼻底黏膜注射ICG 2-3ml，
      30分钟内颈深淋巴系统显影良好。

  # KB-7: 颅内动脉瘤筛查与危险信号
  - title: "颅内动脉瘤筛查与危险信号"
    category: "diagnosis"
    source: "陆华教授科普文章"
    source_url: "https://mp.weixin.qq.com/s/zGQ7xXlZ4xHvclI8zFA2BA"
    content: |
      【颅内动脉瘤不是肿瘤】
      是颅内动脉血管壁上的局部膨出，形似气球，充盈血液。
      主要成因：先天性/遗传；诱发因素：高血压、动脉硬化、吸烟
      【危险信号症状】
      - 搏动性头痛（最常见）
      - 突发剧烈头痛（前哨出血的信号）
      - 颈部僵硬/枕后疼痛（蛛网膜下腔出血刺激脊神经根）
      - 无诱因的癫痫发作
      - 眩晕、视力变化、感觉运动障碍
      【高危人群筛查建议】
      以下人群应行MRA或CTA筛查：
      - 家族中有动脉瘤病史者
      - 多囊肝/肾病患者
      - 马凡综合征
      - 女性、年龄>30岁
      - 吸烟者、高血压患者
      发现异常需行DSA确诊

