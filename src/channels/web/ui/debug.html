<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor AI — Debug Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f23;
    --card: #1a1a2e;
    --card2: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text-muted: #888;
    --text-dim: #aaa;
    --green: #4caf50;
    --yellow: #ff9800;
    --red: #f44336;
    --blue: #2196f3;
    --purple: #9c27b0;
    --teal: #009688;
    --orange: #ff5722;
    --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ---- TOP BAR ---- */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
  }

  .topbar-title {
    font-weight: 700;
    font-size: 15px;
    color: var(--green);
    flex-shrink: 0;
  }

  .topbar-sep { color: var(--border); }

  .topbar-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
  }

  select, button, input[type="text"] {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
  }

  select:focus, input[type="text"]:focus { outline: 2px solid var(--blue); }

  button {
    background: var(--card2);
    transition: background 0.15s;
  }
  button:hover { background: #2a2a4a; }
  button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  button.btn-danger { background: #3a1a1a; border-color: var(--red); color: var(--red); }
  button.btn-danger:hover { background: #5a2a2a; }

  /* ---- TABS ---- */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    padding: 0 20px;
  }

  .tab {
    padding: 12px 18px;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .tab-badge {
    display: inline-block;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 9px;
    padding: 1px 5px;
    margin-left: 5px;
    line-height: 1.4;
  }

  /* ---- TAB FILTERS BAR ---- */
  .filter-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-label { color: var(--text-muted); font-size: 12px; }

  input.filter-text {
    padding: 4px 8px;
    font-size: 12px;
    width: 200px;
    background: var(--bg);
  }

  /* ---- CONTENT ---- */
  .content {
    padding: 16px 20px;
    max-width: 1400px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ---- CARDS / ROWS ---- */
  .list { display: flex; flex-direction: column; gap: 6px; }

  .row-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .row-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.12s;
    flex-wrap: wrap;
  }

  .row-header:hover { background: rgba(255,255,255,0.04); }

  .row-body {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .row-body.open { display: block; }

  /* ---- BADGES ---- */
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--mono);
    flex-shrink: 0;
  }

  .badge-green  { background: rgba(76,175,80,0.2);  color: var(--green); }
  .badge-yellow { background: rgba(255,152,0,0.2);  color: var(--yellow); }
  .badge-red    { background: rgba(244,67,54,0.2);  color: var(--red); }
  .badge-blue   { background: rgba(33,150,243,0.2); color: var(--blue); }
  .badge-purple { background: rgba(156,39,176,0.2); color: var(--purple); }
  .badge-teal   { background: rgba(0,150,136,0.2);  color: var(--teal); }
  .badge-orange { background: rgba(255,87,34,0.2);  color: var(--orange); }
  .badge-gray   { background: rgba(150,150,150,0.15); color: #aaa; }

  .method-badge { font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .method-GET    { color: var(--green); }
  .method-POST   { color: var(--blue); }
  .method-DELETE { color: var(--red); }
  .method-PUT    { color: var(--yellow); }
  .method-PATCH  { color: var(--orange); }

  /* ---- SPANS / WATERFALL ---- */
  .waterfall { padding: 12px 14px; }
  .waterfall-title { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .span-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 12px;
  }

  .span-label {
    width: 220px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .span-bar-bg {
    flex: 1;
    height: 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .span-bar {
    height: 100%;
    border-radius: 3px;
    min-width: 3px;
    position: absolute;
    left: 0;
  }

  .span-ms {
    width: 60px;
    text-align: right;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
  }

  /* ---- LLM MESSAGES ---- */
  .msg-section { border-bottom: 1px solid var(--border); }
  .msg-section:last-child { border-bottom: none; }

  .msg-role-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.02);
    user-select: none;
  }
  .msg-role-header:hover { background: rgba(255,255,255,0.05); }

  .msg-role-label { flex: 1; }
  .msg-toggle { color: var(--text-muted); font-size: 12px; }

  .msg-content {
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-dim);
    max-height: 400px;
    overflow-y: auto;
    display: none;
  }
  .msg-content.open { display: block; }

  /* ---- HEALTH CARDS ---- */
  .health-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .health-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .health-card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .health-card-value {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--mono);
  }

  .health-card-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .val-green  { color: var(--green); }
  .val-yellow { color: var(--yellow); }
  .val-red    { color: var(--red); }
  .val-blue   { color: var(--blue); }

  /* ---- SECTION HEADERS ---- */
  .section-header {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  /* ---- MISC ---- */
  .ts { color: var(--text-muted); font-family: var(--mono); font-size: 11px; flex-shrink: 0; }
  .path-text { font-family: var(--mono); font-size: 12px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .latency-text { font-family: var(--mono); font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .trace-id-text { font-family: var(--mono); font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 40px;
    font-size: 14px;
  }

  .loading {
    text-align: center;
    color: var(--text-muted);
    padding: 30px;
    font-size: 13px;
  }

  .error-line {
    background: var(--card);
    border: 1px solid rgba(244,67,54,0.3);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .error-event { color: var(--red); font-weight: 600; }
  .error-trace-link { color: var(--blue); cursor: pointer; text-decoration: underline; font-size: 11px; }

  .json-out {
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    color: #8bc34a;
    max-height: 300px;
    overflow-y: auto;
    background: #0a1500;
    border-top: 1px solid var(--border);
  }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.hidden { display: none; }

  .modal-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 32px;
    min-width: 340px;
    max-width: 420px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--green);
  }

  .modal-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .modal-input {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    margin-bottom: 14px;
  }
  .modal-input:focus { outline: 2px solid var(--green); }

  .modal-btn {
    width: 100%;
    padding: 9px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .modal-btn:hover { background: #66bb6a; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 768px) {
    .topbar { padding: 8px 12px; gap: 8px; }
    .content { padding: 12px; }
    .tabs { padding: 0 12px; overflow-x: auto; }
    .tab { padding: 10px 12px; font-size: 12px; }
    .filter-bar { padding: 6px 12px; }
    .span-label { width: 120px; }
    .health-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Token modal -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal-box">
    <div class="modal-title">Debug Dashboard</div>
    <div class="modal-sub">Enter your debug access token to continue. The token is set via <code>UI_DEBUG_TOKEN</code> in your environment.</div>
    <input type="password" class="modal-input" id="tokenInput" placeholder="debug token..." autocomplete="off">
    <button class="modal-btn" id="tokenSubmit">Access Dashboard</button>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-title">Doctor AI Debug</span>
  <span class="topbar-sep">|</span>
  <div class="topbar-controls">
    <span class="filter-label">Time range:</span>
    <select id="globalTimeRange">
      <option value="15">15 min</option>
      <option value="60" selected>1 hour</option>
      <option value="360">6 hours</option>
      <option value="1440">24 hours</option>
    </select>
    <button id="refreshBtn">↻ Refresh</button>
    <button id="autoRefreshBtn">Auto (30s)</button>
    <span class="filter-label" id="lastRefreshed" style="font-size:11px;color:var(--text-muted);"></span>
  </div>
</div>

<!-- Tab bar -->
<div class="tabs">
  <div class="tab active" data-tab="llm">LLM Calls</div>
  <div class="tab" data-tab="requests">Requests</div>
  <div class="tab" data-tab="errors">Errors <span class="tab-badge" id="errorBadge" style="display:none">0</span></div>
  <div class="tab" data-tab="health">Health</div>
</div>

<!-- ===================== TAB: REQUESTS ===================== -->
<div class="tab-panel" id="panel-requests">
  <div class="filter-bar">
    <span class="filter-label">Path:</span>
    <input type="text" class="filter-text" id="reqSearch" placeholder="filter by path...">
    <span class="filter-label">Status:</span>
    <select id="reqStatusFilter">
      <option value="all">All</option>
      <option value="2xx">2xx</option>
      <option value="4xx">4xx</option>
      <option value="5xx">5xx</option>
    </select>
    <span class="filter-label" id="reqCount" style="margin-left:auto;font-size:11px;"></span>
  </div>
  <div class="content">
    <div class="list" id="requestsList">
      <div class="loading">Loading requests...</div>
    </div>
  </div>
</div>

<!-- ===================== TAB: LLM CALLS ===================== -->
<div class="tab-panel active" id="panel-llm">
  <div class="filter-bar">
    <span class="filter-label">Op:</span>
    <select id="llmOpFilter">
      <option value="">All ops</option>
      <option value="routing">routing</option>
      <option value="diagnosis">diagnosis</option>
      <option value="interview">interview</option>
      <option value="query_record">query_record</option>
      <option value="create_record">create_record</option>
      <option value="query_task">query_task</option>
      <option value="create_task">create_task</option>
      <option value="query_patient">query_patient</option>
      <option value="daily_summary">daily_summary</option>
      <option value="general">general</option>
    </select>
    <input type="text" class="filter-text" id="llmSearch" placeholder="search user input...">
    <span class="filter-label" id="llmCount" style="margin-left:auto;font-size:11px;"></span>
  </div>
  <div class="content">
    <div class="list" id="llmList">
      <div class="loading">Loading LLM calls...</div>
    </div>
    <div id="llmLoadMore" style="display:none;text-align:center;padding:12px;">
      <button onclick="loadMoreLLM()" style="background:var(--card);border:1px solid rgba(255,255,255,0.15);color:var(--text);padding:8px 24px;border-radius:6px;cursor:pointer;">Load more</button>
      <span id="llmPageInfo" style="font-size:11px;color:var(--text-muted);margin-left:8px;"></span>
    </div>
  </div>
</div>

<!-- ===================== TAB: ERRORS ===================== -->
<div class="tab-panel" id="panel-errors">
  <div class="filter-bar">
    <span class="filter-label">Source:</span>
    <select id="errSourceFilter">
      <option value="app">app.log</option>
      <option value="tasks">tasks.log</option>
      <option value="scheduler">scheduler.log</option>
    </select>
    <span class="filter-label" id="errCount" style="margin-left:auto;font-size:11px;"></span>
  </div>
  <div class="content">
    <div class="list" id="errorsList">
      <div class="loading">Loading errors...</div>
    </div>
  </div>
</div>

<!-- ===================== TAB: HEALTH ===================== -->
<div class="tab-panel" id="panel-health">
  <div class="content">
    <div id="healthContent">
      <div class="loading">Loading health data...</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let currentTab = 'llm';
let autoRefreshTimer = null;
let autoRefreshOn = false;

// Data caches
let reqData = null;
let llmData = null;
let errData = null;
let healthData = null;
let routingData = null;

// ============================================================
// TOKEN MANAGEMENT
// ============================================================
function getToken() { return localStorage.getItem('debug_token') || ''; }

function showTokenModal() {
  document.getElementById('tokenModal').classList.remove('hidden');
  document.getElementById('tokenInput').focus();
}

function hideTokenModal() {
  document.getElementById('tokenModal').classList.add('hidden');
}

document.getElementById('tokenSubmit').addEventListener('click', () => {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  localStorage.setItem('debug_token', val);
  hideTokenModal();
  loadCurrentTab(true);
});

document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('tokenSubmit').click();
});

// ============================================================
// API FETCH
// ============================================================
async function apiFetch(path) {
  const token = getToken();
  try {
    const res = await fetch(path, { headers: { 'X-Debug-Token': token } });
    if (res.status === 403) {
      localStorage.removeItem('debug_token');
      showTokenModal();
      return null;
    }
    if (!res.ok) {
      console.warn('API error', res.status, path);
      return null;
    }
    return await res.json();
  } catch (e) {
    console.error('fetch error', path, e);
    return null;
  }
}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const name = tab.dataset.tab;
    switchTab(name);
  });
});

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${name}`));
  loadCurrentTab(false);
}

// ============================================================
// REFRESH
// ============================================================
document.getElementById('refreshBtn').addEventListener('click', () => loadCurrentTab(true));

document.getElementById('autoRefreshBtn').addEventListener('click', () => {
  autoRefreshOn = !autoRefreshOn;
  const btn = document.getElementById('autoRefreshBtn');
  btn.classList.toggle('active', autoRefreshOn);
  btn.textContent = autoRefreshOn ? 'Auto ON (30s)' : 'Auto (30s)';
  if (autoRefreshOn) {
    autoRefreshTimer = setInterval(() => loadCurrentTab(true), 30000);
  } else {
    clearInterval(autoRefreshTimer);
  }
});

document.getElementById('globalTimeRange').addEventListener('change', () => loadCurrentTab(true));

function stampRefreshed() {
  const el = document.getElementById('lastRefreshed');
  el.textContent = 'Refreshed ' + new Date().toLocaleTimeString();
}

function loadCurrentTab(force) {
  if (currentTab === 'requests')  loadRequests(force);
  else if (currentTab === 'llm')  loadLLM(force);
  else if (currentTab === 'errors') loadErrors(force);
  else if (currentTab === 'health') loadHealth(force);
}

// ============================================================
// HELPERS
// ============================================================
function sinceMinutes() { return parseInt(document.getElementById('globalTimeRange').value, 10); }

function statusBadgeClass(code) {
  if (!code) return 'badge-gray';
  if (code < 300) return 'badge-green';
  if (code < 500) return 'badge-yellow';
  return 'badge-red';
}

function statusGroup(code) {
  if (!code) return 'other';
  if (code < 300) return '2xx';
  if (code < 500) return '4xx';
  return '5xx';
}

function fmtTs(ts) {
  if (!ts) return '';
  try {
    // Normalize timestamp formats:
    // 1. "2026-03-28T05:33:55.299500Z" (old naive+Z) — valid
    // 2. "2026-03-29T17:58:11+00:00Z" (double suffix bug) — strip trailing Z
    // 3. "2026-03-29T17:58:11+00:00" (new aware) — valid
    let normalized = ts;
    if (normalized.endsWith('+00:00Z')) normalized = normalized.slice(0, -1);
    // Truncate microseconds beyond 3 digits (JS only handles ms)
    normalized = normalized.replace(/(\.\d{3})\d+/, '$1');
    const d = new Date(normalized);
    if (isNaN(d.getTime())) return ts.slice(11, 19) || ts;
    return d.toLocaleTimeString();
  } catch { return ts; }
}

function fmtMs(ms) {
  if (ms == null) return '—';
  if (ms < 1000) return `${Math.round(ms)}ms`;
  return `${(ms / 1000).toFixed(2)}s`;
}

function opBadgeClass(op) {
  const map = {
    routing: 'badge-blue', diagnosis: 'badge-purple', interview: 'badge-teal',
    query_record: 'badge-green', create_record: 'badge-orange',
    query_task: 'badge-yellow', create_task: 'badge-orange',
    query_patient: 'badge-teal', daily_summary: 'badge-purple', general: 'badge-gray',
  };
  return map[op] || 'badge-gray';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleRowBody(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function toggleMsgSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  const arrow = document.getElementById('arrow-' + id);
  if (arrow) arrow.textContent = isOpen ? '▾' : '▸';
}

// ============================================================
// TAB 1: REQUESTS
// ============================================================
async function loadRequests(force) {
  if (!force && reqData) { renderRequests(); return; }
  const data = await apiFetch(`/api/debug/observability?trace_limit=100&span_limit=300`);
  if (!data) return;
  reqData = data;
  stampRefreshed();
  renderRequests();
}

function renderRequests() {
  const search = document.getElementById('reqSearch').value.toLowerCase();
  const statusF = document.getElementById('reqStatusFilter').value;
  const traces = (reqData && reqData.recent_traces) || [];

  let filtered = traces.filter(t => {
    if (search && !(t.path || '').toLowerCase().includes(search)) return false;
    if (statusF !== 'all' && statusGroup(t.status_code) !== statusF) return false;
    return true;
  });

  document.getElementById('reqCount').textContent = `${filtered.length} / ${traces.length} requests`;

  const container = document.getElementById('requestsList');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No matching requests</div>';
    return;
  }

  // Group spans by trace_id for waterfall use
  const spansByTrace = {};
  ((reqData && reqData.recent_spans) || []).forEach(s => {
    if (!spansByTrace[s.trace_id]) spansByTrace[s.trace_id] = [];
    spansByTrace[s.trace_id].push(s);
  });

  container.innerHTML = filtered.map(t => {
    const tid = t.trace_id || '';
    const shortTid = tid.slice(0, 8);
    const spans = spansByTrace[tid] || [];
    const bodyId = `req-body-${shortTid}`;

    return `
    <div class="row-card">
      <div class="row-header" onclick="expandRequest('${escHtml(tid)}', '${bodyId}')">
        <span class="method-badge method-${escHtml(t.method || 'GET')}">${escHtml(t.method || 'GET')}</span>
        <span class="path-text">${escHtml(t.path || '')}</span>
        <span class="badge ${statusBadgeClass(t.status_code)}">${t.status_code || '?'}</span>
        <span class="latency-text">${fmtMs(t.latency_ms)}</span>
        <span class="ts">${fmtTs(t.started_at)}</span>
        <span class="trace-id-text">${escHtml(shortTid)}</span>
      </div>
      <div class="row-body" id="${bodyId}">
        ${renderWaterfall(spans, t.latency_ms)}
        <div id="llm-linked-${shortTid}" style="padding:0 14px 12px">
          <div style="font-size:11px;color:var(--text-muted);margin-top:8px;">LLM calls loading...</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function expandRequest(traceId, bodyId) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  if (!isOpen) return;

  // Load linked LLM calls
  const shortTid = traceId.slice(0, 8);
  const llmEl = document.getElementById(`llm-linked-${shortTid}`);
  if (!llmEl || llmEl.dataset.loaded) return;
  llmEl.dataset.loaded = '1';

  const data = await apiFetch(`/api/debug/llm-calls?trace_id=${encodeURIComponent(traceId)}&limit=10`);
  if (!data || !data.calls || !data.calls.length) {
    llmEl.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding-top:4px;">No LLM calls for this trace</div>';
    return;
  }

  llmEl.innerHTML = `<div style="font-size:11px;color:var(--text-muted);margin-top:8px;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">Linked LLM Calls</div>` +
    data.calls.map((c, i) => {
      const cid = `linked-llm-${shortTid}-${i}`;
      return buildLlmCard(c, cid);
    }).join('');
}

function renderWaterfall(spans, totalMs) {
  if (!spans.length) return '<div style="padding:12px 14px;font-size:12px;color:var(--text-muted);">No spans</div>';

  const maxMs = Math.max(totalMs || 0, ...spans.map(s => s.latency_ms || 0), 1);
  const layerColors = {
    router: '#2196f3', llm: '#9c27b0', db: '#4caf50',
    cache: '#ff9800', handler: '#009688',
  };

  return `<div class="waterfall">
    <div class="waterfall-title">Span Waterfall</div>
    ${spans.map(s => {
      const pct = Math.min(100, ((s.latency_ms || 0) / maxMs) * 100);
      const color = layerColors[s.layer] || '#607d8b';
      const statusCol = s.status === 'error' ? 'var(--red)' : color;
      return `<div class="span-row">
        <div class="span-label" title="${escHtml(s.name)}">${escHtml(s.name)}</div>
        <div class="span-bar-bg">
          <div class="span-bar" style="width:${pct}%;background:${statusCol};"></div>
        </div>
        <div class="span-ms">${fmtMs(s.latency_ms)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// Live filters
document.getElementById('reqSearch').addEventListener('input', renderRequests);
document.getElementById('reqStatusFilter').addEventListener('change', renderRequests);

// ============================================================
// TAB 2: LLM CALLS
// ============================================================
let llmOffset = 0;
const LLM_PAGE_SIZE = 30;

async function loadLLM(force) {
  if (!force && llmData) { renderLLM(); return; }
  llmOffset = 0;
  document.getElementById('llmList').innerHTML = '<div class="loading">Loading...</div>';
  const op = document.getElementById('llmOpFilter').value;
  const mins = sinceMinutes();
  let url = `/api/debug/llm-calls?limit=${LLM_PAGE_SIZE}&offset=0&since_minutes=${mins}`;
  if (op) url += `&op=${encodeURIComponent(op)}`;
  const data = await apiFetch(url);
  if (!data) return;
  llmData = data;
  llmOffset = data.calls.length;
  stampRefreshed();
  renderLLM();
  updateLoadMoreBtn();
}

async function loadMoreLLM() {
  const btn = document.querySelector('#llmLoadMore button');
  btn.textContent = 'Loading...';
  btn.disabled = true;
  const op = document.getElementById('llmOpFilter').value;
  const mins = sinceMinutes();
  let url = `/api/debug/llm-calls?limit=${LLM_PAGE_SIZE}&offset=${llmOffset}&since_minutes=${mins}`;
  if (op) url += `&op=${encodeURIComponent(op)}`;
  const data = await apiFetch(url);
  btn.textContent = 'Load more';
  btn.disabled = false;
  if (!data || !data.calls.length) return;
  llmData.calls = llmData.calls.concat(data.calls);
  llmData.total = data.total;
  llmData.has_more = data.has_more;
  llmOffset += data.calls.length;
  renderLLM();
  updateLoadMoreBtn();
}

function updateLoadMoreBtn() {
  const el = document.getElementById('llmLoadMore');
  const info = document.getElementById('llmPageInfo');
  if (llmData && llmData.has_more) {
    el.style.display = 'block';
    info.textContent = `showing ${llmData.calls.length} of ${llmData.total}`;
  } else {
    el.style.display = 'none';
  }
}

// Extract the user's actual input from an LLM call entry
function extractUserInput(c) {
  const messages = (c.input && c.input.messages) || c.messages || [];
  // Find last user message
  for (let i = messages.length - 1; i >= 0; i--) {
    if (messages[i].role === 'user') {
      const content = messages[i].content || '';
      // For Pattern 1: extract from <doctor_request> tag
      const m = content.match(/<doctor_request>\s*([\s\S]*?)\s*<\/doctor_request>/);
      if (m) return m[1].trim();
      return content.trim().slice(0, 200);
    }
  }
  return '';
}

function renderLLM() {
  const calls = (llmData && llmData.calls) || [];
  const searchTerm = (document.getElementById('llmSearch').value || '').trim().toLowerCase();

  const filtered = searchTerm
    ? calls.filter(c => extractUserInput(c).toLowerCase().includes(searchTerm))
    : calls;

  document.getElementById('llmCount').textContent = `${filtered.length}/${calls.length} calls`;

  const container = document.getElementById('llmList');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">${calls.length ? 'No calls match search' : 'No LLM calls in this time range'}</div>`;
    return;
  }

  container.innerHTML = filtered.map((c, i) => buildLlmCard(c, `llm-${i}`)).join('');
}

// Parse system message into layers using known markers
function parseSystemLayers(text) {
  if (!text) return [];
  const layers = [];
  // Known section patterns (order matters — first match wins)
  const markers = [
    { label: 'L1 Identity & Safety', pattern: /^# Role: 医生AI临床助手/m },
    { label: 'L2 Specialty', pattern: /^# .{2,20}专科知识/m },
    { label: 'L3 Intent Rules', pattern: /^(?:# Role:|# 意图|\/no_think)/m },
    { label: 'L4 Doctor Knowledge', pattern: /^【医生知识库】|^\[KB-/m },
    { label: 'L5 Patient Context', pattern: /^## 当前状态/m },
  ];

  // Find all marker positions
  const positions = [];
  for (const mk of markers) {
    const match = text.match(mk.pattern);
    if (match) positions.push({ label: mk.label, start: match.index });
  }
  positions.sort((a, b) => a.start - b.start);

  // Split text into segments
  for (let i = 0; i < positions.length; i++) {
    const start = positions[i].start;
    const end = i + 1 < positions.length ? positions[i + 1].start : text.length;
    layers.push({ label: positions[i].label, content: text.slice(start, end).trim() });
  }

  // If no markers found, return the whole text as one layer
  if (!layers.length) layers.push({ label: 'SYSTEM', content: text });
  return layers;
}

// Parse user message with XML tags into layers
function parseUserLayers(text) {
  if (!text) return [];
  const layers = [];
  const tagMap = {
    'doctor_knowledge': 'L4 Doctor Knowledge',
    'patient_context': 'L5 Patient Context',
    'doctor_request': 'L6 User Message',
  };
  const tagRe = /<(doctor_knowledge|patient_context|doctor_request)>\s*([\s\S]*?)\s*<\/\1>/g;
  let match;
  let found = false;
  while ((match = tagRe.exec(text)) !== null) {
    found = true;
    layers.push({ label: tagMap[match[1]] || match[1], content: match[2].trim() });
  }
  if (!found) layers.push({ label: 'USER', content: text });
  return layers;
}

function renderLayerSection(layer, sectionId, defaultOpen) {
  const isL6 = layer.label.includes('User Message') || layer.label === 'USER';
  const color = layer.label.startsWith('L1') ? '#ff9800' :
                layer.label.startsWith('L2') ? '#e91e63' :
                layer.label.startsWith('L3') ? '#9c27b0' :
                layer.label.startsWith('L4') ? '#00bcd4' :
                layer.label.startsWith('L5') ? '#8bc34a' :
                isL6 ? '#2196f3' : '#aaa';
  const openClass = defaultOpen ? ' open' : '';
  const openStyle = defaultOpen ? ' style="display:block;"' : '';
  return `
    <div class="msg-section">
      <div class="msg-role-header" onclick="toggleMsgSection('${sectionId}')">
        <span class="msg-role-label" style="color:${color};">${escHtml(layer.label)}</span>
        <span style="font-size:11px;color:var(--text-muted);">${layer.content.length} chars</span>
        <span class="msg-toggle" id="arrow-${sectionId}">${defaultOpen ? '▾' : '▸'}</span>
      </div>
      <div class="msg-content${openClass}" id="${sectionId}"${openStyle}>${escHtml(layer.content)}</div>
    </div>`;
}

function buildLlmCard(c, cid) {
  const op = c.op || 'unknown';
  const model = c.model || '—';
  const tokObj = c.tokens || {};
  const tokTotal = tokObj.total || null;
  const tokStr = tokTotal != null ? `${tokTotal} tok` : '';
  const messages = (c.input && c.input.messages) || c.messages || [];
  const output = c.output || c.response || null;
  const userInput = extractUserInput(c);
  const userPreview = userInput.length > 60 ? userInput.slice(0, 60) + '...' : userInput;

  // Build layer-structured input sections
  let inputHtml = '';
  let sectionIdx = 0;
  for (const msg of messages) {
    const role = (msg.role || '').toLowerCase();
    const content = typeof msg.content === 'string' ? msg.content :
      Array.isArray(msg.content) ? msg.content.map(p => typeof p === 'string' ? p : (p.text || JSON.stringify(p))).join('\n') :
      JSON.stringify(msg.content, null, 2);

    if (role === 'system') {
      const layers = parseSystemLayers(content);
      for (const layer of layers) {
        inputHtml += renderLayerSection(layer, `sec-${cid}-${sectionIdx++}`, false);
      }
    } else if (role === 'user') {
      // Check for XML-tagged layers (Pattern 1)
      if (content.includes('<doctor_knowledge>') || content.includes('<doctor_request>')) {
        const layers = parseUserLayers(content);
        for (const layer of layers) {
          const isUserMsg = layer.label.includes('User Message');
          inputHtml += renderLayerSection(layer, `sec-${cid}-${sectionIdx++}`, isUserMsg);
        }
      } else {
        // Plain user message (Pattern 2 conversation or simple)
        inputHtml += renderLayerSection(
          { label: 'L6 User Message', content },
          `sec-${cid}-${sectionIdx++}`, true
        );
      }
    } else if (role === 'assistant') {
      // Conversation history turns
      inputHtml += renderLayerSection(
        { label: 'HISTORY (assistant)', content },
        `sec-${cid}-${sectionIdx++}`, false
      );
    }
  }

  // Output section — always open
  let outputHtml = '';
  if (output != null) {
    const outputText = typeof output === 'string' ? output : JSON.stringify(output, null, 2);
    outputHtml = `
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);">
        <div class="msg-section">
          <div class="msg-role-header" onclick="toggleMsgSection('out-${cid}')">
            <span class="msg-role-label" style="color:var(--green);font-weight:bold;">OUTPUT</span>
            <span style="font-size:11px;color:var(--text-muted);">${outputText.length} chars</span>
            <span class="msg-toggle" id="arrow-out-${cid}">▾</span>
          </div>
          <div class="msg-content open" id="out-${cid}" style="display:block;">${escHtml(outputText)}</div>
        </div>
      </div>`;
  }

  return `
  <div class="row-card">
    <div class="row-header" onclick="toggleRowBody('body-${cid}')">
      <span class="badge ${opBadgeClass(op)}">${escHtml(op)}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text-dim);flex-shrink:0;">${escHtml(model)}</span>
      ${tokStr ? `<span style="font-family:var(--mono);font-size:11px;color:var(--text-muted);">${escHtml(tokStr)}</span>` : ''}
      <span class="ts">${fmtTs(c.timestamp)}</span>
      ${c.trace_id ? `<span class="trace-id-text">${escHtml(c.trace_id.slice(0,8))}</span>` : ''}
      <span style="font-size:12px;color:var(--text-dim);margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;">${escHtml(userPreview)}</span>
    </div>
    <div class="row-body" id="body-${cid}">
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Input Layers</div>
      ${inputHtml}
      ${outputHtml}
    </div>
  </div>`;
}

document.getElementById('llmOpFilter').addEventListener('change', () => { llmData = null; loadLLM(true); });
document.getElementById('llmSearch').addEventListener('input', renderLLM);

// TAB 3: ERRORS
// ============================================================
async function loadErrors(force) {
  if (!force && errData) { renderErrors(); return; }
  const source = document.getElementById('errSourceFilter').value;
  const data = await apiFetch(`/api/debug/logs?level=ERROR&limit=100&source=${source}`);
  if (!data) return;
  errData = data;
  stampRefreshed();
  renderErrors();

  // Update badge
  const count = (data.lines || []).length;
  const badge = document.getElementById('errorBadge');
  badge.style.display = count ? '' : 'none';
  badge.textContent = count > 99 ? '99+' : String(count);
}

function parseErrorLine(raw) {
  try {
    const obj = JSON.parse(raw);
    return {
      timestamp: obj.timestamp || obj.ts || '',
      event: obj.event || obj.message || obj.msg || raw,
      trace_id: obj.trace_id || obj.traceId || null,
      level: obj.level || 'error',
      extra: obj,
    };
  } catch {
    return { timestamp: '', event: raw, trace_id: null, level: 'error', extra: null };
  }
}

function renderErrors() {
  const lines = (errData && errData.lines) || [];
  document.getElementById('errCount').textContent = `${lines.length} errors`;

  const container = document.getElementById('errorsList');
  if (!lines.length) {
    container.innerHTML = '<div class="empty-state">No errors found</div>';
    return;
  }

  container.innerHTML = lines.slice().reverse().map(raw => {
    const p = parseErrorLine(raw);
    const traceLink = p.trace_id
      ? `<span class="error-trace-link" onclick="gotoTrace('${escHtml(p.trace_id)}')" title="View trace">${escHtml(p.trace_id.slice(0, 8))}</span>`
      : '';
    return `<div class="error-line">
      <span class="ts" style="margin-right:8px;">${escHtml(fmtTs(p.timestamp))}</span>
      <span class="error-event">${escHtml(p.event)}</span>
      ${traceLink ? `<span style="margin-left:8px;">${traceLink}</span>` : ''}
    </div>`;
  }).join('');
}

function gotoTrace(traceId) {
  switchTab('requests');
  setTimeout(() => {
    document.getElementById('reqSearch').value = traceId.slice(0, 8);
    renderRequests();
  }, 100);
}

document.getElementById('errSourceFilter').addEventListener('change', () => { errData = null; loadErrors(true); });

// TAB 4: HEALTH
// ============================================================
async function loadHealth(force) {
  if (!force && healthData && routingData) { renderHealth(); return; }
  const [hz, obs, routing] = await Promise.all([
    apiFetch('/healthz'),
    apiFetch('/api/debug/observability?trace_limit=200&summary_limit=500'),
    apiFetch('/api/debug/routing-metrics'),
  ]);
  healthData = { hz, obs };
  routingData = routing;
  stampRefreshed();
  renderHealth();
}

function renderHealth() {
  const container = document.getElementById('healthContent');
  const hz = healthData && healthData.hz;
  const obs = healthData && healthData.obs;

  let html = '';

  // Status cards
  html += '<div class="section-header">System Status</div>';
  html += '<div class="health-grid">';

  if (hz) {
    const checks = hz.checks || {};
    const overall = hz.status || 'unknown';
    html += healthMetricCard('Overall', overall.toUpperCase(), overall === 'ok' ? 'val-green' : 'val-red', '');

    Object.entries(checks).forEach(([k, v]) => {
      const isOk = typeof v === 'object' ? v.ok : v;
      const st = isOk === true ? 'ok' : isOk === false ? 'error' : String(v.status || v || 'unknown');
      const cls = st === 'ok' ? 'val-green' : st === 'warn' ? 'val-yellow' : 'val-red';
      html += healthMetricCard(k, st.toUpperCase(), cls, v.error || '');
    });
  } else {
    html += healthMetricCard('Status', 'N/A', 'val-gray', 'Could not reach /healthz');
  }

  html += '</div>';

  // Latency summary
  if (obs && obs.summary) {
    html += '<div class="section-header">Latency (recent requests)</div>';
    html += '<div class="health-grid">';
    const s = obs.summary;
    html += healthMetricCard('p50', s.p50_ms != null ? `${Math.round(s.p50_ms)}ms` : '—', latencyClass(s.p50_ms), '');
    html += healthMetricCard('p95', s.p95_ms != null ? `${Math.round(s.p95_ms)}ms` : '—', latencyClass(s.p95_ms), '');
    html += healthMetricCard('p99', s.p99_ms != null ? `${Math.round(s.p99_ms)}ms` : '—', latencyClass(s.p99_ms), '');
    html += healthMetricCard('Count', s.count != null ? String(s.count) : '0', 'val-blue', 'requests measured');
    html += '</div>';
  }

  // Routing metrics
  if (routingData) {
    html += '<div class="section-header">Fast Router vs LLM</div>';
    html += '<div class="health-grid">';
    const rd = routingData;
    const fast = rd.fast_route_hits || 0;
    const llm = rd.llm_route_hits || 0;
    const total = fast + llm;
    const pct = total > 0 ? Math.round((fast / total) * 100) : 0;
    html += healthMetricCard('Fast-Route Hits', String(fast), 'val-green', '');
    html += healthMetricCard('LLM Hits', String(llm), 'val-purple', '');
    html += healthMetricCard('Hit Rate', `${pct}%`, pct >= 50 ? 'val-green' : 'val-yellow', 'fast route %');

    // Show individual route details if present
    if (rd.routes) {
      const entries = Object.entries(rd.routes).sort((a, b) => (b[1].hits || 0) - (a[1].hits || 0));
      entries.forEach(([route, info]) => {
        html += healthMetricCard(route, String(info.hits || 0), 'val-blue', info.last_match ? fmtTs(info.last_match) : '');
      });
    }
    html += '</div>';
  }

  container.innerHTML = html;
}

function healthMetricCard(label, value, valueClass, sub) {
  return `<div class="health-card">
    <div class="health-card-label">${escHtml(label)}</div>
    <div class="health-card-value ${valueClass}">${escHtml(value)}</div>
    ${sub ? `<div class="health-card-sub">${escHtml(sub)}</div>` : ''}
  </div>`;
}

function latencyClass(ms) {
  if (ms == null) return 'val-gray';
  if (ms < 300) return 'val-green';
  if (ms < 1000) return 'val-yellow';
  return 'val-red';
}
